  <!-- Bottom text -->
  <text x="960" y="820" font-family="Inter, sans-serif" font-size="28" fill="#E8E6E3" text-anchor="middle" font-weight="300" letter-spacing="1">No proof. No accountability. No trust.</text>

  <!-- Subtitle -->
  <text x="960" y="870" font-family="Inter, sans-serif" font-size="14" fill="#5A5A5E" text-anchor="middle">Which agent acted? Who authorized it? What went wrong?</text>

  <!-- Three problem indicators -->
  <rect x="560" y="920" width="200" height="36" rx="4" fill="#F87171" opacity="0.08"/>
  <text x="660" y="943" font-family="JetBrains Mono, monospace" font-size="12" fill="#F87171" text-anchor="middle">No provenance</text>

  <rect x="860" y="920" width="200" height="36" rx="4" fill="#F87171" opacity="0.08"/>
  <text x="960" y="943" font-family="JetBrains Mono, monospace" font-size="12" fill="#F87171" text-anchor="middle">No audit trail</text>

  <rect x="1160" y="920" width="200" height="36" rx="4" fill="#F87171" opacity="0.08"/>
  <text x="1260" y="943" font-family="JetBrains Mono, monospace" font-size="12" fill="#F87171" text-anchor="middle">No authority chain</text>
