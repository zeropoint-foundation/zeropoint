<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <rect width="1920" height="1080" fill="#0A0A0C"/>

  <!-- Title -->
  <text x="960" y="80" font-family="Inter, sans-serif" font-size="18" fill="#8A8A8E" text-anchor="middle" letter-spacing="4">DELEGATION CHAIN</text>

  <!-- Human (root) -->
  <circle cx="960" cy="180" r="30" fill="none" stroke="#7EB8DA" stroke-width="2"/>
  <text x="960" y="186" font-family="Inter, sans-serif" font-size="14" fill="#7EB8DA" text-anchor="middle">H</text>
  <text x="960" y="230" font-family="Inter, sans-serif" font-size="14" fill="#E8E6E3" text-anchor="middle">Human (Root Key)</text>
  <!-- Key icon -->
  <rect x="1010" y="165" width="40" height="22" rx="4" fill="#FBBF24" opacity="0.2" stroke="#FBBF24" stroke-width="1"/>
  <text x="1030" y="181" font-family="Inter, sans-serif" font-size="11" fill="#FBBF24" text-anchor="middle">🔑</text>

  <!-- Line to Agent A -->
  <line x1="960" y1="210" x2="960" y2="300" stroke="#333338" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Agent A -->
  <circle cx="960" cy="330" r="24" fill="none" stroke="#4ADE80" stroke-width="2"/>
  <text x="960" y="336" font-family="Inter, sans-serif" font-size="13" fill="#4ADE80" text-anchor="middle">A</text>

  <!-- Capability badge for A -->
  <rect x="1010" y="315" width="180" height="30" rx="4" fill="#1A1A22" stroke="#4ADE80" stroke-width="1"/>
  <text x="1100" y="335" font-family="JetBrains Mono, monospace" font-size="12" fill="#4ADE80" text-anchor="middle">Read: data/*</text>

  <!-- Depth indicator -->
  <text x="870" y="336" font-family="JetBrains Mono, monospace" font-size="11" fill="#5A5A5E" text-anchor="end">depth: 1</text>

  <!-- Line to Agent B -->
  <line x1="960" y1="354" x2="960" y2="440" stroke="#333338" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Agent B -->
  <circle cx="960" cy="470" r="24" fill="none" stroke="#4ADE80" stroke-width="2"/>
  <text x="960" y="476" font-family="Inter, sans-serif" font-size="13" fill="#4ADE80" text-anchor="middle">B</text>

  <!-- Narrowed capability badge -->
  <rect x="1010" y="455" width="180" height="30" rx="4" fill="#1A1A22" stroke="#4ADE80" stroke-width="1"/>
  <text x="1100" y="475" font-family="JetBrains Mono, monospace" font-size="12" fill="#4ADE80" text-anchor="middle">Read: data/public</text>

  <!-- Depth indicator -->
  <text x="870" y="476" font-family="JetBrains Mono, monospace" font-size="11" fill="#5A5A5E" text-anchor="end">depth: 2</text>

  <!-- Narrowing visual: bracket lines -->
  <line x1="1190" y1="330" x2="1210" y2="330" stroke="#333338" stroke-width="1"/>
  <line x1="1210" y1="330" x2="1210" y2="470" stroke="#333338" stroke-width="1"/>
  <line x1="1190" y1="470" x2="1210" y2="470" stroke="#333338" stroke-width="1"/>
  <text x="1230" y="405" font-family="Inter, sans-serif" font-size="12" fill="#5A5A5E" text-anchor="start">Scope narrows</text>
  <text x="1230" y="420" font-family="Inter, sans-serif" font-size="12" fill="#5A5A5E" text-anchor="start">at every link</text>

  <!-- Failed delegation attempt -->
  <line x1="960" y1="494" x2="960" y2="580" stroke="#F87171" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <circle cx="960" cy="610" r="24" fill="none" stroke="#F87171" stroke-width="2" opacity="0.5"/>
  <text x="960" y="616" font-family="Inter, sans-serif" font-size="13" fill="#F87171" text-anchor="middle" opacity="0.5">C</text>

  <!-- Rejected badge -->
  <rect x="1010" y="595" width="180" height="30" rx="4" fill="#F87171" opacity="0.1" stroke="#F87171" stroke-width="1"/>
  <text x="1100" y="615" font-family="JetBrains Mono, monospace" font-size="12" fill="#F87171" text-anchor="middle">Write: data/*</text>

  <!-- X mark -->
  <line x1="1200" y1="600" x2="1220" y2="620" stroke="#F87171" stroke-width="2.5"/>
  <line x1="1220" y1="600" x2="1200" y2="620" stroke="#F87171" stroke-width="2.5"/>
  <text x="1260" y="615" font-family="Inter, sans-serif" font-size="12" fill="#F87171">Scope exceeded</text>

  <!-- Right side: tamper detection demo -->
  <text x="400" y="300" font-family="Inter, sans-serif" font-size="16" fill="#8A8A8E" text-anchor="middle">Chain Verification</text>

  <!-- Valid chain segment -->
  <rect x="300" y="330" width="200" height="36" rx="4" fill="#1A1A22" stroke="#4ADE80" stroke-width="1"/>
  <text x="400" y="353" font-family="JetBrains Mono, monospace" font-size="11" fill="#4ADE80" text-anchor="middle">af1349b9...c6e7</text>
  <line x1="400" y1="366" x2="400" y2="385" stroke="#4ADE80" stroke-width="1"/>

  <rect x="300" y="385" width="200" height="36" rx="4" fill="#1A1A22" stroke="#4ADE80" stroke-width="1"/>
  <text x="400" y="408" font-family="JetBrains Mono, monospace" font-size="11" fill="#4ADE80" text-anchor="middle">71e3bda9...b81</text>
  <line x1="400" y1="421" x2="400" y2="440" stroke="#4ADE80" stroke-width="1"/>

  <!-- Tampered entry -->
  <rect x="300" y="440" width="200" height="36" rx="4" fill="#F87171" opacity="0.1" stroke="#F87171" stroke-width="2"/>
  <text x="400" y="463" font-family="JetBrains Mono, monospace" font-size="11" fill="#F87171" text-anchor="middle">TAMPERED_84ae1...</text>
  <line x1="400" y1="476" x2="400" y2="490" stroke="#F87171" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Broken link indicator -->
  <rect x="300" y="495" width="200" height="36" rx="4" fill="#1A1A22" stroke="#333338" stroke-width="1" opacity="0.5"/>
  <text x="400" y="518" font-family="JetBrains Mono, monospace" font-size="11" fill="#5A5A5E" text-anchor="middle">6e9ea944...073</text>

  <!-- Chain Tampered label -->
  <rect x="320" y="555" width="160" height="30" rx="4" fill="#F87171" opacity="0.15"/>
  <text x="400" y="575" font-family="Inter, sans-serif" font-size="14" fill="#F87171" text-anchor="middle" font-weight="600">Chain Tampered</text>

  <!-- Bottom: invariants -->
  <text x="960" y="800" font-family="Inter, sans-serif" font-size="15" fill="#8A8A8E" text-anchor="middle">Eight invariants enforced at every delegation:</text>

  <text x="480" y="850" font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5E" text-anchor="middle">Parent-child linkage</text>
  <text x="480" y="875" font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5E" text-anchor="middle">Scope subset constraint</text>
  <text x="480" y="900" font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5E" text-anchor="middle">Monotonic depth</text>
  <text x="480" y="925" font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5E" text-anchor="middle">Expiration inheritance</text>

  <text x="1440" y="850" font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5E" text-anchor="middle">Signature verification</text>
  <text x="1440" y="875" font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5E" text-anchor="middle">Grantor-grantee continuity</text>
  <text x="1440" y="900" font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5E" text-anchor="middle">Max delegation depth</text>
  <text x="1440" y="925" font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5E" text-anchor="middle">Trust tier monotonicity</text>

  <!-- Bottom tagline -->
  <text x="960" y="1000" font-family="Inter, sans-serif" font-size="16" fill="#5A5A5E" text-anchor="middle" font-style="italic">"Trust flows from human to agent. At every link, the chain narrows."</text>
</svg>
