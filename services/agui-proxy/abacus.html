<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZeroPoint · Abacus</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0d0f14;
      --surface:   #13161e;
      --surface2:  #1b1f2b;
      --border:    #252a38;
      --accent:    #7c6af7;
      --accent2:   #5eead4;
      --accent3:   #f472b6;
      --text:      #e2e4ed;
      --muted:     #6b7280;
      --danger:    #f87171;
      --success:   #4ade80;
      --warn:      #fbbf24;
      --rail:      #3d4454;   /* abacus rod — visible, structural, not noise */
      --mem:       #8b9dff;   /* memory wire — cool blue, distinct from accent and gate */
      --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      --font-ui:   "Inter", system-ui, sans-serif;
    }
    html, body { background: var(--bg); color: var(--text); height: 100%; font-family: var(--font-ui); }
    body { display: flex; flex-direction: column; overflow: hidden; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 20px;
      padding: 10px 20px; border-bottom: 1px solid var(--border);
      background: var(--surface); flex: 0 0 auto;
    }
    header h1 {
      font-size: 14px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text); flex: 0 0 auto;
    }
    header h1 span { color: var(--accent); }

    /* Pipeline health strip (inherited from the earlier sketch — the
       "is the stack alive?" signal belongs at the top of every governance
       view). */
    .pipeline { display: flex; align-items: center; gap: 10px; flex: 0 0 auto; }
    .node {
      display: flex; align-items: center; gap: 6px; padding: 4px 10px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      font-family: var(--font-mono); font-size: 11px;
    }
    .node-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
    .node.up     .node-dot { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .node.down   .node-dot { background: var(--danger);  box-shadow: 0 0 6px var(--danger); }
    .node-port { color: var(--muted); }
    .pipe-arrow { color: var(--border); font-size: 12px; }

    .stats {
      display: flex; gap: 16px; font-family: var(--font-mono); font-size: 11px;
      color: var(--muted); flex: 1 1 auto;
    }
    .stats .n { color: var(--text); font-weight: 600; }

    header button {
      font-family: var(--font-mono); font-size: 11px;
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px;
      cursor: pointer; flex: 0 0 auto;
    }
    header button:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Main layout ── */
    main { display: flex; flex: 1 1 auto; min-height: 0; }
    #canvas-wrap {
      flex: 1 1 auto; overflow: auto; background: var(--bg); position: relative;
    }
    #canvas { display: block; }

    /* ── Detail panel ── */
    #detail {
      flex: 0 0 380px; border-left: 1px solid var(--border);
      background: var(--surface); padding: 16px; overflow: auto;
      display: flex; flex-direction: column; gap: 12px;
    }
    #detail.empty { color: var(--muted); font-size: 12px; }
    #detail h2 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); font-weight: 500;
    }
    #detail .kv { display: grid; grid-template-columns: 90px 1fr; gap: 4px 10px; font-size: 12px; font-family: var(--font-mono); }
    #detail .kv dt { color: var(--muted); }
    #detail .kv dd { color: var(--text); word-break: break-all; }
    #detail pre {
      font-family: var(--font-mono); font-size: 11px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 10px; overflow: auto; max-height: 360px;
      color: var(--text); white-space: pre-wrap;
    }
    #detail .close {
      align-self: flex-start; font-size: 10px; color: var(--muted); cursor: pointer;
      background: none; border: none;
    }

    /* ── SVG visual grammar ── */
    .wire-rail {
      stroke: var(--rail);
      stroke-width: 1.75;
      stroke-linecap: round;   /* subtle "physical rod" endcaps */
    }
    .wire-label {
      font-family: var(--font-mono); font-size: 10px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.1em; fill: var(--muted);
    }
    /* Poker-chip stacking: beads overlap tightly so the stack reads as
       "a pack of N" rather than "a row of N", but each bead's edge stays
       visible via a contrasting stroke — same way you count chips in a
       stack by seeing the rim of each one. Selected / hover states bring
       the chosen bead to front and boost its rim. */
    .bead {
      stroke: rgba(13,15,20,0.85);   /* bg color at high alpha = chip rim */
      stroke-width: 1;
      cursor: pointer; transition: r 0.1s, stroke-width 0.1s;
    }
    .bead:hover {
      stroke: var(--text); stroke-width: 1.5;
    }
    .bead.selected { stroke: var(--text); stroke-width: 2; }

    /* Highlighted beads (Hermes- or operator-driven emphasis). Glows at
       the accent color so it reads as an overlay, not a replacement of the
       bead's own claim-type palette. */
    .bead.highlighted {
      stroke: var(--accent2);
      stroke-width: 2.5;
      filter: drop-shadow(0 0 4px var(--accent2));
    }
    .bead.highlighted.selected { stroke: var(--text); }

    .bead[data-wire="lifecycle"]  { fill: var(--accent); }
    .bead[data-wire="content"]    { fill: var(--accent2); }
    .bead[data-wire="tool"]       { fill: var(--warn); }
    .bead[data-wire="gate"]       { fill: var(--success); }
    .bead[data-wire="gate"][data-approved="false"] { fill: var(--danger); }
    .bead[data-wire="memory"]     { fill: var(--mem); }
    .bead[data-wire="memory"][data-approved="false"] { fill: var(--danger); }
    .bead[data-wire="telemetry"]  { fill: var(--muted); opacity: 0.55; }
    .bead[data-wire="telemetry"]:hover { opacity: 1; }
    .bead[data-wire="other"]      { fill: var(--accent3); }

    /* Bead-zero marker — anchor each wire visually at its origin. Will be
       load-bearing once signed bead-zero receipts are emitted per wire. */
    .bead-zero-marker {
      fill: none; stroke: var(--accent); stroke-width: 1.5; stroke-dasharray: 2 2;
      opacity: 0.7;
    }

    #tip {
      position: absolute; pointer-events: none; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 6px 10px; font-family: var(--font-mono); font-size: 11px;
      color: var(--text); white-space: nowrap; opacity: 0; transition: opacity 0.08s;
      z-index: 10; max-width: 500px; overflow: hidden; text-overflow: ellipsis;
    }
    #tip.on { opacity: 1; }
    #tip .mono { color: var(--muted); }
  </style>
</head>
<body>

<header>
  <h1>Zero<span>Point</span> · Abacus</h1>

  <div class="pipeline" id="pipeline">
    <div class="node" id="node-zp"><span class="node-dot"></span>zp <span class="node-port">:17010</span></div>
    <span class="pipe-arrow">→</span>
    <div class="node" id="node-proxy"><span class="node-dot"></span>proxy <span class="node-port">:17020</span></div>
    <span class="pipe-arrow">→</span>
    <div class="node" id="node-bridge"><span class="node-dot"></span>bridge <span class="node-port">:17030</span></div>
  </div>

  <div class="stats" id="stats">loading…</div>

  <button id="toggle-empty">hide empty wires</button>
  <button id="refresh">refresh</button>
</header>

<main>
  <div id="canvas-wrap">
    <svg id="canvas"></svg>
    <div id="tip"></div>
  </div>
  <aside id="detail" class="empty">Click a bead to inspect its receipt.</aside>
</main>

<script>
(() => {
  // ── Config ────────────────────────────────────────────────
  const WIRES = ["lifecycle", "content", "tool", "gate", "memory", "telemetry", "other"];
  const ROW_H = 64;
  const BEAD_R = 5.5;                  // slightly larger so the overlap reads as a chip
  const BEAD_SPACING = 4;              // default: chips overlap 2/3 each (poker-chip stack)
  const BEAD_SPACING_EXPANDED = 14;    // fanned: chips separated, each individually readable
  const CLUSTER_GAP_MS = 5000;         // time gap > 5s ⇒ visible break between stacks
  const CLUSTER_GAP_PX = 14;           // extra spacing inserted at a cluster boundary
  const LEFT_PAD = 130;
  const RIGHT_PAD = 40;
  const TOP_PAD = 32;
  const MIN_CANVAS_W = 1400;

  const canvas = document.getElementById("canvas");
  const canvasWrap = document.getElementById("canvas-wrap");
  const statsEl = document.getElementById("stats");
  const detailEl = document.getElementById("detail");
  const tipEl = document.getElementById("tip");

  let events = [];
  let hideEmpty = false;
  // Which cluster (if any) is currently fanned out. Shape: {wire, idx} | null.
  // Clicking a bead toggles its cluster. Clicking the canvas background or
  // pressing Escape collapses.
  let expandedCluster = null;
  let selectedReceiptId = null;
  // Presentation overlays driven externally (Hermes, cockpit, operator).
  // See window.abacus API below. None of these affect the receipt chain —
  // they only change what the viewer sees. Principle 7: mutations to the
  // substrate itself must go through signed receipts, not the UI.
  let highlightedReceiptIds = new Set();
  let filterClaimTypes = null;   // null ⇒ show all; array ⇒ restrict

  // ── Pipeline health ──────────────────────────────────────
  // Per Abacus principle: "is the stack alive?" is answered at the top of
  // every governance view. Pings the health endpoints of each service.
  async function refreshPipeline() {
    const checks = [
      { id: "node-zp",     url: "http://127.0.0.1:17010/api/v1/version" },
      { id: "node-proxy",  url: "/health" },
      { id: "node-bridge", url: "http://127.0.0.1:17030/health" },
    ];
    await Promise.all(checks.map(async c => {
      const el = document.getElementById(c.id);
      try {
        const r = await fetch(c.url, { method: "GET" });
        el.classList.remove("up", "down");
        el.classList.add(r.ok || r.status === 401 ? "up" : "down");
      } catch (e) {
        el.classList.remove("up"); el.classList.add("down");
      }
    }));
  }

  // ── Rendering ─────────────────────────────────────────────
  // v0.2: ordinal per-wire packing. Beads position by their index within
  // the wire, not by absolute timestamp. Fixes v0.1's "scroll hunt for
  // activity" disease where event gaps in wall-clock time (sessions hours
  // apart, bursts seconds wide) created empty canvas with all the beads
  // piled at the far right. Absolute timestamps move to tooltip + detail
  // panel. The bead ribbon reads like an abacus, left→right, first→last.
  function render() {
    canvas.innerHTML = "";

    const wires = hideEmpty
      ? WIRES.filter(w => events.some(e => e.wire === w))
      : WIRES;

    // Group events by wire; events are already time-sorted so per-wire
    // iteration gives chronological order. Filter (if active) drops beads
    // whose claim_type isn't in the allowed set — events still exist in
    // memory so navigate/highlight can reference them; they're just not
    // painted this pass.
    const perWire = Object.fromEntries(WIRES.map(w => [w, []]));
    const visible = filterClaimTypes
      ? events.filter(e => filterClaimTypes.includes(e.claim_type))
      : events;
    visible.forEach(ev => {
      if (perWire[ev.wire]) perWire[ev.wire].push(ev);
    });

    // Per-wire bead x-positions: pack at BEAD_SPACING into tight chip
    // stacks, insert CLUSTER_GAP_PX between clusters (time-gap > 5s). The
    // currently-expanded cluster uses BEAD_SPACING_EXPANDED so its beads
    // fan apart and become individually readable; downstream beads shift
    // right to make room.
    let maxWireEnd = 0;
    Object.entries(perWire).forEach(([wire, beads]) => {
      let cursor = BEAD_SPACING;
      let prevTs = null;
      let clusterIdx = 0;
      beads.forEach(ev => {
        if (prevTs !== null && ev.timestamp - prevTs > CLUSTER_GAP_MS) {
          clusterIdx += 1;
          cursor += CLUSTER_GAP_PX;
        }
        ev._clusterIdx = clusterIdx;
        ev._packedX = LEFT_PAD + cursor;
        const isExpanded = expandedCluster
          && expandedCluster.wire === wire
          && expandedCluster.idx === clusterIdx;
        cursor += isExpanded ? BEAD_SPACING_EXPANDED : BEAD_SPACING;
        prevTs = ev.timestamp;
      });
      if (cursor > maxWireEnd) maxWireEnd = cursor;
    });

    // Canvas width: widest wire drives it. Bound below by viewport / min.
    const packedW = LEFT_PAD + maxWireEnd + RIGHT_PAD;
    const W = Math.max(canvasWrap.clientWidth, MIN_CANVAS_W, packedW);
    const H = TOP_PAD + wires.length * ROW_H + 32;

    canvas.setAttribute("width", W);
    canvas.setAttribute("height", H);
    canvas.style.minWidth = W + "px";

    // Rails + labels
    wires.forEach((wire, idx) => {
      const y = TOP_PAD + idx * ROW_H + ROW_H / 2;

      const rail = document.createElementNS("http://www.w3.org/2000/svg", "line");
      rail.setAttribute("class", "wire-rail");
      rail.setAttribute("x1", LEFT_PAD);
      rail.setAttribute("y1", y);
      rail.setAttribute("x2", W - RIGHT_PAD);
      rail.setAttribute("y2", y);
      canvas.appendChild(rail);

      const lbl = document.createElementNS("http://www.w3.org/2000/svg", "text");
      lbl.setAttribute("class", "wire-label");
      lbl.setAttribute("x", 16);
      lbl.setAttribute("y", y + 4);
      lbl.textContent = wire;
      canvas.appendChild(lbl);

      const n = perWire[wire].length;
      const cnt = document.createElementNS("http://www.w3.org/2000/svg", "text");
      cnt.setAttribute("class", "wire-label");
      cnt.setAttribute("x", 86);
      cnt.setAttribute("y", y + 4);
      cnt.setAttribute("fill", n > 0 ? "var(--text)" : "var(--border)");
      cnt.textContent = n;
      canvas.appendChild(cnt);

      const bz = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      bz.setAttribute("class", "bead-zero-marker");
      bz.setAttribute("cx", LEFT_PAD);
      bz.setAttribute("cy", y);
      bz.setAttribute("r", 6);
      canvas.appendChild(bz);
    });

    // Beads: ordinal per-wire x with temporal-gap clustering.
    visible.forEach(ev => {
      const widx = wires.indexOf(ev.wire);
      if (widx < 0) return;
      const y = TOP_PAD + widx * ROW_H + ROW_H / 2;
      const x = ev._packedX;

      const bead = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      bead.setAttribute("class", "bead");
      bead.setAttribute("data-wire", ev.wire);
      if (ev.approved !== undefined && ev.approved !== null) {
        bead.setAttribute("data-approved", String(!!ev.approved));
      }
      bead.setAttribute("cx", x);
      bead.setAttribute("cy", y);
      bead.setAttribute("r", BEAD_R);
      bead.__event = ev;

      // Preserve selection + highlight across rerenders.
      if (selectedReceiptId && ev.receipt_id === selectedReceiptId) {
        bead.classList.add("selected");
      }
      if (ev.receipt_id && highlightedReceiptIds.has(ev.receipt_id)) {
        bead.classList.add("highlighted");
      }

      bead.addEventListener("click", onBeadClick);
      bead.addEventListener("mouseenter", onBeadEnter);
      bead.addEventListener("mouseleave", onBeadLeave);

      canvas.appendChild(bead);
    });

    // Stats
    const tMin = events.length ? events[0].timestamp : 0;
    const tMax = events.length ? events[events.length - 1].timestamp : 1;
    const ts0 = events.length ? new Date(tMin).toISOString().slice(11, 19) : "—";
    const ts1 = events.length ? new Date(tMax).toISOString().slice(11, 19) : "—";
    const durMin = events.length ? ((tMax - tMin) / 60000).toFixed(1) : 0;
    statsEl.innerHTML = `
      <span><span class="n">${events.length}</span> beads</span>
      <span>${ts0} → ${ts1} (<span class="n">${durMin}m</span>)</span>
      ${WIRES.map(w => {
        const n = perWire[w].length;
        return n > 0 ? `<span>${w}: <span class="n">${n}</span></span>` : "";
      }).filter(Boolean).join(" ")}
    `;
  }

  // ── Bead interactions ────────────────────────────────────
  // Click a bead: (a) select it for the detail panel, (b) fan out its
  // cluster if it wasn't already — or collapse if re-clicking into the
  // same cluster. Stacks away from the clicked one stay tight.
  function onBeadClick(e) {
    const bead = e.currentTarget;
    const ev = bead.__event;
    selectedReceiptId = ev.receipt_id || null;
    renderDetail(ev);

    const sameCluster = expandedCluster
      && expandedCluster.wire === ev.wire
      && expandedCluster.idx === ev._clusterIdx;
    expandedCluster = sameCluster ? null : { wire: ev.wire, idx: ev._clusterIdx };

    render();
    autoScrollToExpansion();
    e.stopPropagation();
  }

  // After expansion, bring the fanned cluster near the left of the viewport
  // so its beads are all reachable without hunting.
  function autoScrollToExpansion() {
    if (!expandedCluster) return;
    const beads = Array.from(canvas.querySelectorAll(".bead"))
      .filter(b => b.__event.wire === expandedCluster.wire
                && b.__event._clusterIdx === expandedCluster.idx);
    if (!beads.length) return;
    const firstX = parseFloat(beads[0].getAttribute("cx"));
    const vw = canvasWrap.clientWidth;
    canvasWrap.scrollLeft = Math.max(0, firstX - vw / 4);
  }

  function onBeadEnter(e) {
    const bead = e.currentTarget;
    const ev = bead.__event;
    const cx = parseFloat(bead.getAttribute("cx"));
    const cy = parseFloat(bead.getAttribute("cy"));
    const dtMs = events.length ? ev.timestamp - events[0].timestamp : 0;
    tipEl.innerHTML = `
      <div>${escHtml(ev.claim_type)}</div>
      <div class="mono">+${(dtMs / 1000).toFixed(2)}s · ${escHtml(ev.source)}${ev.approved === false ? " · BLOCKED" : ""}</div>
    `;
    tipEl.style.left = (cx - canvasWrap.scrollLeft + 10) + "px";
    tipEl.style.top = (cy - canvasWrap.scrollTop - 40) + "px";
    tipEl.classList.add("on");
  }

  function onBeadLeave() { tipEl.classList.remove("on"); }

  function renderDetail(ev) {
    detailEl.classList.remove("empty");
    const iso = new Date(ev.timestamp).toISOString();
    const metadata = ev.metadata && Object.keys(ev.metadata).length
      ? JSON.stringify(ev.metadata, null, 2)
      : "(none)";
    detailEl.innerHTML = `
      <button class="close">× close</button>
      <h2>Bead detail</h2>
      <dl class="kv">
        <dt>claim_type</dt><dd>${escHtml(ev.claim_type)}</dd>
        <dt>wire</dt><dd>${escHtml(ev.wire)}</dd>
        <dt>source</dt><dd>${escHtml(ev.source)}</dd>
        <dt>timestamp</dt><dd>${iso}</dd>
        <dt>receipt_id</dt><dd>${escHtml(ev.receipt_id || "—")}</dd>
        ${ev.event_type ? `<dt>event_type</dt><dd>${escHtml(ev.event_type)}</dd>` : ""}
        ${ev.approved !== undefined && ev.approved !== null ? `<dt>approved</dt><dd>${ev.approved}</dd>` : ""}
        ${ev.reason ? `<dt>reason</dt><dd>${escHtml(ev.reason)}</dd>` : ""}
      </dl>
      <h2>metadata</h2>
      <pre>${escHtml(metadata)}</pre>
    `;
    detailEl.querySelector(".close").addEventListener("click", () => {
      document.querySelectorAll(".bead.selected").forEach(b => b.classList.remove("selected"));
      detailEl.classList.add("empty");
      detailEl.textContent = "Click a bead to inspect its receipt.";
    });
  }

  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, m => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[m]));
  }

  // ── Data load + live stream ──────────────────────────────
  // Prefer the SSE stream so new beads appear as they land. Fall back to
  // one-shot /journal if EventSource isn't available (unlikely in any
  // modern browser, but keeps local probing / curl-style use working).
  let eventSource = null;

  function connectStream() {
    if (!("EventSource" in window)) { loadSnapshot(); return; }
    try {
      if (eventSource) eventSource.close();
      eventSource = new EventSource("/journal/stream");
    } catch (e) { loadSnapshot(); return; }

    eventSource.addEventListener("snapshot", (e) => {
      try {
        const data = JSON.parse(e.data);
        events = data.events || [];
        render();
      } catch { /* malformed event — ignore */ }
    });

    eventSource.addEventListener("append", (e) => {
      try {
        const data = JSON.parse(e.data);
        const incoming = data.events || [];
        if (!incoming.length) return;
        // Receipts arrive in roughly timestamp order; push + sort is
        // acceptable at these rates. If out-of-order becomes common we
        // can switch to insertion-sort by timestamp.
        events.push(...incoming);
        events.sort((a, b) => a.timestamp - b.timestamp);
        render();
      } catch { /* ignore */ }
    });

    eventSource.onerror = () => {
      // Don't aggressively reconnect — EventSource has built-in backoff.
      // If the proxy goes down and comes back, the browser handles it.
      statsEl.innerHTML += ' <span style="color:var(--danger)">stream disconnected</span>';
    };
  }

  async function loadSnapshot() {
    statsEl.textContent = "loading…";
    try {
      const r = await fetch("/journal");
      const j = await r.json();
      events = j.events || [];
      render();
    } catch (e) {
      statsEl.textContent = "failed to load /journal: " + e.message;
    }
  }

  // Public entry point — used by Refresh button, external window.abacus.refresh().
  function load() {
    if (eventSource) { eventSource.close(); eventSource = null; }
    connectStream();
  }

  // ── Wiring ───────────────────────────────────────────────
  document.getElementById("refresh").addEventListener("click", () => {
    refreshPipeline();
    load();
  });
  document.getElementById("toggle-empty").addEventListener("click", e => {
    hideEmpty = !hideEmpty;
    e.target.textContent = hideEmpty ? "show empty wires" : "hide empty wires";
    render();
  });

  // Click canvas background (not a bead) → collapse expansion.
  canvasWrap.addEventListener("click", (e) => {
    if (e.target.tagName === "circle" && e.target.classList.contains("bead")) return;
    if (expandedCluster) {
      expandedCluster = null;
      render();
    }
  });

  // Escape → collapse expansion and deselect.
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      if (expandedCluster || selectedReceiptId) {
        expandedCluster = null;
        selectedReceiptId = null;
        detailEl.classList.add("empty");
        detailEl.textContent = "Click a bead to inspect its receipt.";
        render();
      }
    }
  });

  // ── External drive surface ───────────────────────────────
  // Hermes / the cockpit / any same-origin UI can drive the abacus via:
  //   1. window.abacus.<method>(...)         (direct, same-window)
  //   2. window.postMessage({type:"abacus",   (same-origin, cross-window)
  //                          command, args})
  //
  // These commands affect *presentation only* — navigation, highlight,
  // filter. They cannot add, remove, or modify receipts. The receipt
  // chain is authoritative; the abacus is a view.
  //
  // Commands:
  //   navigate_to       {receipt_id}        → expand its cluster, select,
  //                                            scroll into view, open detail
  //   expand            {wire, cluster_idx} → fan out a specific cluster
  //   collapse                              → un-fan whatever is expanded
  //   highlight         {receipt_ids: [..]} → replace the highlight set
  //   highlight_add     {receipt_ids: [..]} → add to the highlight set
  //   clear_highlights                      → drop all highlights
  //   filter            {claim_types: [..]} → show only matching beads
  //   clear_filter                          → show all beads
  //   refresh                               → re-fetch /journal
  const COMMANDS = {
    navigate_to(args) {
      const ev = events.find(e => e.receipt_id === args.receipt_id);
      if (!ev) return { ok: false, reason: "unknown receipt_id" };
      expandedCluster = { wire: ev.wire, idx: ev._clusterIdx };
      selectedReceiptId = ev.receipt_id;
      render();
      autoScrollToExpansion();
      renderDetail(ev);
      return { ok: true };
    },
    expand(args) {
      if (!args || typeof args.wire !== "string") return { ok: false };
      expandedCluster = { wire: args.wire, idx: args.cluster_idx | 0 };
      render();
      autoScrollToExpansion();
      return { ok: true };
    },
    collapse() {
      expandedCluster = null;
      render();
      return { ok: true };
    },
    highlight(args) {
      highlightedReceiptIds = new Set(args.receipt_ids || []);
      render();
      return { ok: true, count: highlightedReceiptIds.size };
    },
    highlight_add(args) {
      (args.receipt_ids || []).forEach(id => highlightedReceiptIds.add(id));
      render();
      return { ok: true, count: highlightedReceiptIds.size };
    },
    clear_highlights() {
      highlightedReceiptIds = new Set();
      render();
      return { ok: true };
    },
    filter(args) {
      filterClaimTypes = Array.isArray(args.claim_types)
        ? args.claim_types.slice()
        : null;
      render();
      return { ok: true, showing: filterClaimTypes ? filterClaimTypes.length : "all" };
    },
    clear_filter() {
      filterClaimTypes = null;
      render();
      return { ok: true };
    },
    refresh() {
      load();
      return { ok: true };
    },
  };

  function dispatch(command, args) {
    const fn = COMMANDS[command];
    if (!fn) return { ok: false, reason: "unknown command: " + command };
    try { return fn(args || {}); }
    catch (e) { return { ok: false, reason: e.message }; }
  }

  // Expose on window for direct same-window use.
  window.abacus = Object.fromEntries(
    Object.keys(COMMANDS).map(cmd => [cmd, (args) => dispatch(cmd, args)])
  );

  // Listen for postMessage commands. Same-origin only — an opener window
  // or parent iframe can drive the abacus without direct DOM access.
  window.addEventListener("message", (e) => {
    if (e.origin !== location.origin) return;
    const msg = e.data;
    if (!msg || typeof msg !== "object" || msg.type !== "abacus") return;
    const result = dispatch(msg.command, msg.args);
    if (e.source && msg.id) {
      try { e.source.postMessage({ type: "abacus_result", id: msg.id, result }, e.origin); }
      catch {}
    }
  });

  refreshPipeline();
  load();
})();
</script>
</body>
</html>
