# .zp-configure.toml — Ember (OpenMAIC)
# Sovereign learning environment with multi-provider LLM, TTS, ASR, and media support.
# All non-LLM capabilities are optional — Ember functions with just one LLM provider.

[tool]
name = "ember"
version = "0.6.0"
description = "AI learning environment with multi-provider LLM, voice, media, and image analysis capabilities"

# ── Required capabilities ──────────────────────────────────

[[required]]
capability = "reasoning_llm"
env_vars = [
    "OPENAI_API_KEY", "OPENAI_BASE_URL", "OPENAI_MODELS",
    "ANTHROPIC_API_KEY", "ANTHROPIC_BASE_URL", "ANTHROPIC_MODELS",
    "GOOGLE_API_KEY", "GOOGLE_BASE_URL", "GOOGLE_MODELS",
    "DEEPSEEK_API_KEY", "DEEPSEEK_BASE_URL", "DEEPSEEK_MODELS",
    "QWEN_API_KEY", "QWEN_BASE_URL", "QWEN_MODELS",
    "KIMI_API_KEY", "KIMI_BASE_URL", "KIMI_MODELS",
    "MINIMAX_API_KEY", "MINIMAX_BASE_URL", "MINIMAX_MODELS",
    "GLM_API_KEY", "GLM_BASE_URL", "GLM_MODELS",
    "SILICONFLOW_API_KEY", "SILICONFLOW_BASE_URL", "SILICONFLOW_MODELS",
    "DOUBAO_API_KEY", "DOUBAO_BASE_URL", "DOUBAO_MODELS",
]
prefer = ["openai", "anthropic", "gemini", "deepseek"]
notes = "Any single LLM provider is sufficient — Ember routes to whichever are configured"

# ── Optional capabilities ──────────────────────────────────

[[optional]]
capability = "tts"
env_vars = [
    "TTS_OPENAI_API_KEY", "TTS_OPENAI_BASE_URL",
    "TTS_AZURE_API_KEY", "TTS_AZURE_BASE_URL",
    "TTS_GLM_API_KEY", "TTS_GLM_BASE_URL",
    "TTS_QWEN_API_KEY", "TTS_QWEN_BASE_URL",
]
prefer = ["openai"]
notes = "Text-to-speech — ZeroPoint TTS server on localhost:8473 used when available"

[[optional]]
capability = "asr"
env_vars = [
    "ASR_OPENAI_API_KEY", "ASR_OPENAI_BASE_URL",
    "ASR_QWEN_API_KEY", "ASR_QWEN_BASE_URL",
]
prefer = ["openai"]
notes = "Speech recognition / transcription"

[[optional]]
capability = "pdf_processing"
env_vars = [
    "PDF_UNPDF_API_KEY", "PDF_UNPDF_BASE_URL",
    "PDF_MINERU_API_KEY", "PDF_MINERU_BASE_URL",
]
notes = "AI-powered PDF parsing and extraction"

[[optional]]
capability = "image_gen"
env_vars = [
    "IMAGE_SEEDREAM_API_KEY", "IMAGE_SEEDREAM_BASE_URL",
    "IMAGE_QWEN_IMAGE_API_KEY", "IMAGE_QWEN_IMAGE_BASE_URL",
    "IMAGE_NANO_BANANA_API_KEY", "IMAGE_NANO_BANANA_BASE_URL",
]
notes = "Image generation from text prompts"

[[optional]]
capability = "video_gen"
env_vars = [
    "VIDEO_SEEDANCE_API_KEY", "VIDEO_SEEDANCE_BASE_URL",
    "VIDEO_KLING_API_KEY", "VIDEO_KLING_BASE_URL",
    "VIDEO_VEO_API_KEY", "VIDEO_VEO_BASE_URL",
    "VIDEO_SORA_API_KEY", "VIDEO_SORA_BASE_URL",
]
notes = "Video generation — all providers optional"

[[optional]]
capability = "image_analysis"
env_vars = []
notes = "Vision-based image analysis for pedagogical relevance — uses the reasoning_llm provider's vision-capable model. No additional env vars needed beyond reasoning_llm."

[[optional]]
capability = "web_search"
env_vars = ["TAVILY_API_KEY"]
prefer = ["tavily"]
notes = "Real-time web search for grounding"

# ── Provider overrides ──────────────────────────────────────
# Map non-standard env var names for providers the catalog doesn't know about.

[[provider_overrides]]
provider = "qwen"
env_map = { "api_key" = "QWEN_API_KEY", "base_url" = "QWEN_BASE_URL" }

[[provider_overrides]]
provider = "kimi"
env_map = { "api_key" = "KIMI_API_KEY", "base_url" = "KIMI_BASE_URL" }

[[provider_overrides]]
provider = "minimax"
env_map = { "api_key" = "MINIMAX_API_KEY", "base_url" = "MINIMAX_BASE_URL" }

[[provider_overrides]]
provider = "glm"
env_map = { "api_key" = "GLM_API_KEY", "base_url" = "GLM_BASE_URL" }

[[provider_overrides]]
provider = "siliconflow"
env_map = { "api_key" = "SILICONFLOW_API_KEY", "base_url" = "SILICONFLOW_BASE_URL" }

[[provider_overrides]]
provider = "doubao"
env_map = { "api_key" = "DOUBAO_API_KEY", "base_url" = "DOUBAO_BASE_URL" }
