<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroPoint — Live Build Dashboard</title>
<meta name="description" content="Live build dashboard tracking v3 design spec implementation across ZeroPoint's five security planes.">
<style>
:root {
  --bg: #0a0a0c;
  --bg-elevated: #111116;
  --bg-subtle: #18181f;
  --text: #e8e6e3;
  --text-muted: #8a8a8e;
  --text-dim: #5a5a5e;
  --accent: #7eb8da;
  --accent-dim: #4a7a96;
  --green: #22c55e;
  --green-glow: rgba(34, 197, 94, 0.12);
  --green-border: rgba(34, 197, 94, 0.25);
  --yellow: #eab308;
  --yellow-glow: rgba(234, 179, 8, 0.15);
  --yellow-border: rgba(234, 179, 8, 0.3);
  --blue: #60a5fa;
  --red: #f87171;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'IBM Plex Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}

/* ── Pulse animation for active items ── */
@keyframes pulse-dot {
  0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--yellow); }
  50% { opacity: 0.4; box-shadow: 0 0 8px var(--yellow), 0 0 16px rgba(234, 179, 8, 0.3); }
}
@keyframes pulse-row {
  0%, 100% { background: transparent; }
  50% { background: var(--yellow-glow); }
}
@keyframes glow-in {
  from { opacity: 0; transform: translateX(-4px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ── Nav ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--bg-subtle);
}
nav {
  max-width: 1280px;
  margin: 0 auto;
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-logo {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text);
  text-decoration: none;
}
.nav-logo span { color: var(--accent); }
.nav-badge {
  font-size: 0.6rem;
  background: var(--green);
  color: #000;
  padding: 2px 6px;
  border-radius: 3px;
  margin-left: 8px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 1rem;
  font-size: 0.75rem;
  color: var(--text-dim);
}
.live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse-dot 2s ease-in-out infinite;
  display: inline-block;
}

/* ── Container ── */
.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 1.5rem 2rem;
}

h1 {
  font-size: 1.4rem;
  color: var(--text);
  margin-bottom: 0.15rem;
  font-weight: 600;
}
.subtitle {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-bottom: 1.25rem;
}

/* ── Build Progress ── */
.build-progress {
  background: var(--bg-elevated);
  border: 1px solid var(--bg-subtle);
  border-radius: 8px;
  padding: 1rem 1.25rem;
  margin-bottom: 1.25rem;
}
.build-progress h2 {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.phase-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 0.75rem;
}
.phase-card {
  background: var(--bg);
  border: 1px solid var(--bg-subtle);
  border-radius: 6px;
  padding: 0.75rem;
  position: relative;
  overflow: hidden;
}
.phase-card.complete {
  border-color: var(--green-border);
  background: linear-gradient(135deg, var(--bg) 0%, var(--green-glow) 100%);
}
.phase-card.in-progress {
  border-color: var(--yellow-border);
  animation: pulse-row 3s ease-in-out infinite;
}
.phase-card .phase-name {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.25rem;
}
.phase-card .phase-items {
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-bottom: 0.5rem;
}
.phase-bar {
  height: 3px;
  background: var(--bg-subtle);
  border-radius: 2px;
  overflow: hidden;
}
.phase-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s ease;
}
.phase-card.complete .phase-bar-fill { background: var(--green); }
.phase-card.in-progress .phase-bar-fill { background: var(--yellow); }
.phase-card.pending .phase-bar-fill { background: var(--blue); width: 0% !important; }
.phase-pct {
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-top: 0.25rem;
  text-align: right;
}
.phase-card.complete .phase-pct { color: var(--green); }
.phase-card.in-progress .phase-pct { color: var(--yellow); }

/* ── Stats Row ── */
.stats {
  display: flex;
  gap: 1rem;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}
.stat-box {
  background: var(--bg-elevated);
  border: 1px solid var(--bg-subtle);
  border-radius: 6px;
  padding: 0.6rem 0.9rem;
  min-width: 100px;
}
.stat-box .stat-value {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text);
}
.stat-box .stat-label {
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-top: 0.1rem;
}
.stat-box.highlight .stat-value { color: var(--green); }

/* ── Legend ── */
.legend {
  display: flex;
  gap: 1.25rem;
  margin-bottom: 1.25rem;
  font-size: 0.72rem;
  color: var(--text-muted);
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 0.375rem;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot.shipped { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.4); }
.dot.active { background: var(--yellow); animation: pulse-dot 2s ease-in-out infinite; }
.dot.roadmap { background: var(--blue); opacity: 0.6; }

/* ── Filter Bar ── */
.filter-bar {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}
.filter-btn {
  font-family: inherit;
  font-size: 0.7rem;
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--bg-subtle);
  background: var(--bg-elevated);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--accent-dim); color: var(--text); }
.filter-btn.active-filter { border-color: var(--accent); color: var(--accent); background: rgba(126,184,218,0.08); }

/* ── Tree ── */
.tree ul { margin-left: 20px; border-left: 1px solid var(--bg-subtle); }
.tree li {
  list-style: none;
  position: relative;
  padding: 2px 0 2px 16px;
}
.tree li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 12px;
  width: 12px;
  border-top: 1px solid var(--bg-subtle);
}
.node {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s;
  font-size: 0.78rem;
}
.node:hover { background: var(--bg-subtle); }

/* Shipped nodes get a subtle green treatment */
.node.node-shipped {
  border-left: 2px solid var(--green-border);
  padding-left: 6px;
}
.node.node-shipped .label { color: var(--green); opacity: 0.85; }

/* Active nodes pulse */
.node.node-active {
  border-left: 2px solid var(--yellow-border);
  padding-left: 6px;
  animation: pulse-row 3s ease-in-out infinite;
}
.node.node-active .label { color: var(--yellow); }

/* Roadmap nodes are dimmed */
.node.node-roadmap .label { color: var(--text-dim); }

.node .indicator {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.node .indicator.shipped { background: var(--green); box-shadow: 0 0 4px rgba(34,197,94,0.5); }
.node .indicator.active { background: var(--yellow); animation: pulse-dot 2s ease-in-out infinite; }
.node .indicator.roadmap { background: var(--blue); opacity: 0.5; }
.node .label { color: var(--text); }
.node .detail {
  color: var(--text-dim);
  font-size: 0.65rem;
  font-style: italic;
}
.node .phase-tag {
  font-size: 0.55rem;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.node .phase-tag.done { background: rgba(34,197,94,0.15); color: var(--green); }
.node .phase-tag.wip { background: rgba(234,179,8,0.15); color: var(--yellow); }

.plane-header {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
  padding: 0.5rem 0 0.25rem 0;
  margin-top: 0.75rem;
  border-bottom: 1px solid var(--bg-subtle);
  margin-bottom: 0.25rem;
  cursor: pointer;
  user-select: none;
}
.plane-header .plane-tag {
  font-size: 0.62rem;
  font-weight: 400;
  padding: 2px 6px;
  border-radius: 3px;
  margin-left: 8px;
}
.plane-header .plane-tag.pathway { background: #1a2e1a; color: #4ade80; }
.plane-header .plane-tag.claim { background: #1a1a2e; color: #60a5fa; }
.plane-header .plane-tag.meaning { background: #2e2a1a; color: #fbbf24; }
.plane-header .plane-tag.cognition { background: #2e1a2e; color: #c084fc; }
.plane-header .plane-tag.compromise { background: #2e1a1a; color: #f87171; }
.plane-header .plane-tag.infra { background: #1a2020; color: #5eead4; }
.plane-header .plane-progress {
  float: right;
  font-size: 0.65rem;
  font-weight: 400;
  color: var(--text-dim);
}

.collapsed > ul { display: none; }
.toggle {
  display: inline-block;
  width: 14px;
  font-size: 0.6rem;
  color: var(--text-dim);
  text-align: center;
  cursor: pointer;
  user-select: none;
}

/* ── Footer ── */
.footer {
  margin-top: 2rem;
  padding-top: 1rem;
  border-top: 1px solid var(--bg-subtle);
  font-size: 0.68rem;
  color: var(--text-dim);
  text-align: center;
}
.footer a { color: var(--accent); text-decoration: none; }
.footer a:hover { text-decoration: underline; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .container { padding: 1rem; }
  nav { padding: 0.75rem 1rem; }
  .phase-grid { grid-template-columns: 1fr; }
  .stats { gap: 0.5rem; }
  .stat-box { min-width: 75px; padding: 0.4rem 0.6rem; }
  .stat-box .stat-value { font-size: 1.1rem; }
  h1 { font-size: 1.15rem; }
}
</style>
</head>

// ── Render Build Phases ──
function renderPhases() {
  const container = document.getElementById('phases');
  phases.forEach(phase => {
    const done = phase.items.filter(i => i.done).length;
    const total = phase.items.length;
    const pct = Math.round((done / total) * 100);

    const card = document.createElement('div');
    card.className = `phase-card ${phase.status}`;
    card.innerHTML = `
      <div class="phase-name">${phase.name}</div>
      <div class="phase-items">${phase.items.map(i =>
        `<span style="color:${i.done ? 'var(--green)' : 'var(--text-dim)'}">${i.done ? '\u2713' : '\u2022'} ${i.id}</span>`
      ).join(' &nbsp; ')}</div>
      <div class="phase-bar"><div class="phase-bar-fill" style="width:${pct}%"></div></div>
      <div class="phase-pct">${done}/${total} &mdash; ${pct}%</div>
    `;
    container.appendChild(card);
  });
}

// ── Compute Stats ──
function countNodes(items) {
  let shipped = 0, active = 0, roadmap = 0;
  items.forEach(item => {
    if (!item.plane) {
      if (item.status === 'shipped') shipped++;
      else if (item.status === 'active') active++;
      else roadmap++;
    }
    if (item.children) {
      const sub = countNodes(item.children);
      shipped += sub.shipped;
      active += sub.active;
      roadmap += sub.roadmap;
    }
  });
  return { shipped, active, roadmap };
}

function renderStats() {
  const counts = countNodes(data);
  const total = counts.shipped + counts.active + counts.roadmap;
  const phaseDone = phases.reduce((a, p) => a + p.items.filter(i => i.done).length, 0);
  const phaseTotal = phases.reduce((a, p) => a + p.items.length, 0);
  const container = document.getElementById('stats-row');
  const stats = [
    { value: counts.shipped, label: 'Shipped', highlight: true },
    { value: counts.active, label: 'In Progress', highlight: false },
    { value: counts.roadmap, label: 'Roadmap', highlight: false },
    { value: Math.round((counts.shipped / total) * 100) + '%', label: 'Complete', highlight: true },
    { value: `${phaseDone}/${phaseTotal}`, label: 'v3 Items Done', highlight: false },
    { value: '28', label: 'Crates', highlight: false },
    { value: '700+', label: 'Tests', highlight: false },
  ];
  stats.forEach(s => {
    const box = document.createElement('div');
    box.className = `stat-box${s.highlight ? ' highlight' : ''}`;
    box.innerHTML = `<div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div>`;
    container.appendChild(box);
  });
}

// ── Filters ──
let activeFilter = 'all';
function renderFilters() {
  const container = document.getElementById('filters');
  const filters = [
    { key: 'all', label: 'All' },
    { key: 'shipped', label: 'Shipped' },
    { key: 'active', label: 'Active' },
    { key: 'roadmap', label: 'Roadmap' },
    { key: 'v3', label: 'v3 Spec Items' },
  ];
  filters.forEach(f => {
    const btn = document.createElement('button');
    btn.className = `filter-btn${f.key === activeFilter ? ' active-filter' : ''}`;
    btn.textContent = f.label;
    btn.addEventListener('click', () => {
      activeFilter = f.key;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
      btn.classList.add('active-filter');
      document.getElementById('tree').innerHTML = '';
      renderTree(data, document.getElementById('tree'));
    });
    container.appendChild(btn);
  });
}

// ── Should show node based on filter ──
function shouldShow(item) {
  if (activeFilter === 'all') return true;
  if (activeFilter === 'v3') return !!item.phase;
  return item.status === activeFilter;
}

function hasVisibleDescendant(item) {
  if (shouldShow(item)) return true;
  if (item.children) return item.children.some(c => hasVisibleDescendant(c));
  return false;
}

// ── Compute plane progress ──
function planeProgress(items) {
  let shipped = 0, total = 0;
  items.forEach(item => {
    if (!item.plane) {
      total++;
      if (item.status === 'shipped') shipped++;
    }
    if (item.children) {
      const sub = planeProgress(item.children);
      shipped += sub.shipped;
      total += sub.total;
    }
  });
  return { shipped, total };
}

// ── Render Tree ──
function renderTree(items, parent) {
  const ul = document.createElement('ul');
  items.forEach(item => {
    if (!hasVisibleDescendant(item) && !item.plane) return;

    const li = document.createElement('li');
    const hasChildren = item.children && item.children.length > 0;

    if (item.plane) {
      const header = document.createElement('div');
      header.className = 'plane-header';
      const toggle = document.createElement('span');
      toggle.className = 'toggle';
      toggle.textContent = '\u25BC';
      header.appendChild(toggle);
      header.appendChild(document.createTextNode(' ' + item.label + ' '));
      const tag = document.createElement('span');
      tag.className = 'plane-tag ' + item.plane;
      tag.textContent = item.tag;
      header.appendChild(tag);

      // Plane progress
      if (item.children) {
        const prog = planeProgress(item.children);
        const progSpan = document.createElement('span');
        progSpan.className = 'plane-progress';
        progSpan.textContent = `${prog.shipped}/${prog.total}`;
        header.appendChild(progSpan);
      }

      li.appendChild(header);
      header.addEventListener('click', () => {
        li.classList.toggle('collapsed');
        toggle.textContent = li.classList.contains('collapsed') ? '\u25B6' : '\u25BC';
      });
    } else {
      const node = document.createElement('span');
      node.className = `node node-${item.status || 'roadmap'}`;

      if (hasChildren) {
        const toggle = document.createElement('span');
        toggle.className = 'toggle';
        toggle.textContent = '\u25BC';
        node.appendChild(toggle);
        node.addEventListener('click', () => {
          li.classList.toggle('collapsed');
          toggle.textContent = li.classList.contains('collapsed') ? '\u25B6' : '\u25BC';
        });
      }

      const indicator = document.createElement('span');
      indicator.className = 'indicator ' + (item.status || 'roadmap');
      node.appendChild(indicator);

      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = item.label;
      node.appendChild(label);

      if (item.detail) {
        const det = document.createElement('span');
        det.className = 'detail';
        det.textContent = item.detail;
        node.appendChild(det);
      }

      if (item.phase) {
        const phaseTag = document.createElement('span');
        phaseTag.className = `phase-tag ${item.status === 'shipped' ? 'done' : (item.status === 'active' ? 'wip' : '')}`;
        phaseTag.textContent = item.phase;
        node.appendChild(phaseTag);
      }

      li.appendChild(node);
    }

    if (hasChildren) {
      renderTree(item.children, li);
    }

    ul.appendChild(li);
  });
  parent.appendChild(ul);
}

// ── Timestamp ──
function updateTimestamp() {
  const now = new Date();
  const ts = now.toLocaleString('en-US', {
    month: 'short', day: 'numeric', year: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
  document.getElementById('timestamp').textContent = ts;
  document.getElementById('footer-ts').textContent = ts;
}

// ── Init ──

updateTimestamp();
setInterval(updateTimestamp, 1000);
