<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZeroPoint Mail</title>
<style>
/* ─── Reset & Base ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --bg-panel: #12121a;
  --bg-hover: #1a1a28;
  --bg-selected: #1e1e30;
  --border: #222233;
  --text: #e0e0e8;
  --text-dim: #888898;
  --text-bright: #ffffff;
  --accent: #4a9eff;
  --accent-dim: #2a5a99;
  --green: #3ddc84;
  --red: #ff4444;
  --yellow: #ffb84d;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  --sidebar-w: 220px;
  --list-w: 380px;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  font-size: 13px;
  line-height: 1.5;
}

/* ─── Layout: sidebar | list | reader ──────────────────── */
#app {
  display: grid;
  grid-template-columns: var(--sidebar-w) var(--list-w) 1fr;
  height: 100vh;
}

/* ─── Sidebar ──────────────────────────────────────────── */
#sidebar {
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 0;
}

.sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-bright);
  letter-spacing: -0.3px;
}

.sidebar-header .operator-name {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

.compose-btn {
  margin: 12px 16px;
  padding: 8px 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}
.compose-btn:hover { background: #5aadff; }

.folder-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.folder-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 20px;
  cursor: pointer;
  color: var(--text-dim);
  font-size: 13px;
  transition: all 0.1s;
  border-left: 3px solid transparent;
}

.folder-item:hover {
  background: var(--bg-hover);
  color: var(--text);
}

.folder-item.active {
  background: var(--bg-selected);
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: 500;
}

.folder-item .count {
  font-size: 11px;
  font-family: var(--mono);
  background: var(--bg-hover);
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 20px;
  text-align: center;
}

.folder-item.active .count {
  background: var(--accent-dim);
  color: #fff;
}

.sidebar-section {
  padding: 12px 20px 6px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
}

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 10px;
  color: var(--text-dim);
  text-align: center;
}

.sidebar-footer .gov-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--green);
  font-family: var(--mono);
}

/* ─── Message List ─────────────────────────────────────── */
#message-list {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.list-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.list-header h2 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-bright);
}

.search-box {
  flex: 1;
  max-width: 200px;
  padding: 5px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 12px;
  outline: none;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text-dim); }

.list-body {
  flex: 1;
  overflow-y: auto;
}

.msg-item {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}

.msg-item:hover { background: var(--bg-hover); }
.msg-item.selected { background: var(--bg-selected); }

.msg-item.unread { border-left: 3px solid var(--accent); }
.msg-item.unread .msg-from { color: var(--text-bright); font-weight: 600; }
.msg-item.unread .msg-subject { color: var(--text-bright); }

.msg-from {
  font-size: 12px;
  color: var(--text);
  margin-bottom: 2px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.msg-date {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text-dim);
  flex-shrink: 0;
}

.msg-subject {
  font-size: 13px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}

.msg-preview {
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  opacity: 0.7;
}

.msg-star {
  position: absolute;
  right: 16px;
  top: 10px;
  cursor: pointer;
  color: var(--text-dim);
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.1s;
}
.msg-item:hover .msg-star { opacity: 1; }
.msg-star.starred { opacity: 1; color: var(--yellow); }

.msg-attach-badge {
  display: inline-block;
  font-size: 10px;
  color: var(--text-dim);
  margin-left: 6px;
}

.list-empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
}

/* ─── Reader Pane ──────────────────────────────────────── */
#reader {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.reader-empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-size: 14px;
}

.reader-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
}

.reader-subject {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 8px;
  line-height: 1.3;
}

.reader-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: var(--text-dim);
}

.reader-from {
  color: var(--text);
  font-weight: 500;
}

.reader-actions {
  margin-left: auto;
  display: flex;
  gap: 8px;
}

.reader-actions button {
  padding: 4px 12px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.1s;
}
.reader-actions button:hover {
  background: var(--bg-selected);
  border-color: var(--accent);
  color: var(--accent);
}

.reader-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

.reader-body-text {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  word-wrap: break-word;
  max-width: 680px;
}

.reader-attachments {
  padding: 12px 24px;
  border-top: 1px solid var(--border);
}

.reader-attachments h4 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.att-item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 12px;
  color: var(--text);
  margin-right: 8px;
  margin-bottom: 4px;
  cursor: pointer;
  transition: border-color 0.1s;
}
.att-item:hover { border-color: var(--accent); }

.att-size {
  font-size: 10px;
  color: var(--text-dim);
  font-family: var(--mono);
}

/* ─── Compose Modal ────────────────────────────────────── */
.compose-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.compose-overlay.open { display: flex; }

.compose-window {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  width: 640px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.compose-title {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.compose-title span {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-bright);
}

.compose-close {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  padding: 2px 6px;
}
.compose-close:hover { color: var(--text); }

.compose-fields {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.compose-field {
  display: flex;
  align-items: center;
  gap: 8px;
}

.compose-field label {
  font-size: 12px;
  color: var(--text-dim);
  width: 50px;
  text-align: right;
  flex-shrink: 0;
}

.compose-field input {
  flex: 1;
  padding: 6px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 13px;
  outline: none;
}
.compose-field input:focus { border-color: var(--accent); }

.compose-body-wrap {
  flex: 1;
  padding: 0 16px;
}

.compose-body-wrap textarea {
  width: 100%;
  min-height: 200px;
  padding: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 13px;
  font-family: var(--font);
  line-height: 1.6;
  resize: vertical;
  outline: none;
}
.compose-body-wrap textarea:focus { border-color: var(--accent); }

.compose-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.send-btn {
  padding: 7px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 5px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}
.send-btn:hover { background: #5aadff; }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.compose-status {
  font-size: 11px;
  color: var(--text-dim);
}

/* ─── Loading / Status ─────────────────────────────────── */
.loading {
  color: var(--text-dim);
  font-size: 12px;
  padding: 20px;
  text-align: center;
}

.status-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 24px;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 10px;
  color: var(--text-dim);
  font-family: var(--mono);
  gap: 16px;
  z-index: 50;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
}

/* ─── Scrollbar ────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover { background: #333; }
</style>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <h1>ZeroPoint Mail</h1>
      <div class="operator-name" id="operator-label">Authenticating...</div>
    </div>
    <button class="compose-btn" onclick="openCompose()">Compose</button>
    <div class="sidebar-section">Folders</div>
    <div class="folder-list" id="folder-list"></div>
    <div class="sidebar-section">Mailboxes</div>
    <div id="mailbox-list"></div>
    <div class="sidebar-footer">
      <span class="gov-badge"><span class="status-dot"></span> governed</span>
    </div>
  </div>

  <!-- Message List -->
  <div id="message-list">
    <div class="list-header">
      <h2 id="list-title">Inbox</h2>
      <input class="search-box" type="text" placeholder="Search..." id="search-input" oninput="filterMessages()">
    </div>
    <div class="list-body" id="list-body">
      <div class="loading">Loading messages...</div>
    </div>
  </div>

  <!-- Reader -->
  <div id="reader">
    <div class="reader-empty" id="reader-empty">Select a message to read</div>
    <div id="reader-content" style="display:none">
      <div class="reader-header">
        <div class="reader-subject" id="r-subject"></div>
        <div class="reader-meta">
          <span class="reader-from" id="r-from"></span>
          <span id="r-date"></span>
          <span id="r-to"></span>
          <div class="reader-actions">
            <button onclick="replyToMessage()">Reply</button>
            <button onclick="archiveMessage()">Archive</button>
            <button onclick="deleteMessage()">Trash</button>
          </div>
        </div>
      </div>
      <div class="reader-body">
        <div class="reader-body-text" id="r-body"></div>
      </div>
      <div class="reader-attachments" id="r-attachments" style="display:none">
        <h4>Attachments</h4>
        <div id="r-att-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- Compose Modal -->
<div class="compose-overlay" id="compose-overlay">
  <div class="compose-window">
    <div class="compose-title">
      <span id="compose-title-text">New Message</span>
      <button class="compose-close" onclick="closeCompose()">&times;</button>
    </div>
    <div class="compose-fields">
      <div class="compose-field">
        <label>From</label>
        <input type="text" id="c-from" readonly>
      </div>
      <div class="compose-field">
        <label>To</label>
        <input type="text" id="c-to" placeholder="recipient@example.com">
      </div>
      <div class="compose-field">
        <label>Subject</label>
        <input type="text" id="c-subject" placeholder="Subject">
      </div>
    </div>
    <div class="compose-body-wrap">
      <textarea id="c-body" placeholder="Write your message..."></textarea>
    </div>
    <div class="compose-footer">
      <span class="compose-status" id="compose-status"></span>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<!-- Status Bar -->
<div class="status-bar">
  <span><span class="status-dot"></span></span>
  <span id="status-text">Ready</span>
  <span style="margin-left:auto" id="receipt-count"></span>
</div>

<script>
// ─── State ─────────────────────────────────────────────────

const API = window.location.origin;

const state = {
  mailbox: 'ken',
  folder: 'inbox',
  messages: [],
  selectedId: null,
  selectedMsg: null,
  operatorName: 'Ken',
  replyTo: null,
};

const FOLDERS = [
  { id: 'inbox', name: 'Inbox', icon: '' },
  { id: 'sent', name: 'Sent', icon: '' },
  { id: 'archive', name: 'Archive', icon: '' },
  { id: 'starred', name: 'Starred', icon: '' },
  { id: 'trash', name: 'Trash', icon: '' },
];

const MAILBOXES = ['ken', 'kalyn', 'lorrie', 'katie', 'info'];

// ─── Auth ──────────────────────────────────────────────────
// In pixel-streaming mode, APOLLO signs requests on behalf of
// the operator. For direct-access mode, the operator's signing
// key would be loaded here. For now, we pass a placeholder
// that the governance gate will validate.

async function apiCall(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };

  // Auth header — in production, this is signed by the operator's
  // Ed25519 key. For local dev, the worker can be configured to
  // bypass auth or use a dev token.
  const timestamp = Date.now();
  // Placeholder: actual signing happens via APOLLO's key manager
  opts.headers['Authorization'] = `ZP ${state.mailbox}:${timestamp}:dev`;

  if (body) opts.body = JSON.stringify(body);

  const res = await fetch(API + path, opts);
  return res.json();
}

// ─── Data Loading ──────────────────────────────────────────

async function loadMessages() {
  setStatus('Loading...');
  const folderParam = state.folder === 'starred' ? 'inbox' : state.folder;
  const data = await apiCall('GET', `/api/mail/${state.mailbox}?folder=${folderParam}&limit=100`);

  if (data.messages) {
    state.messages = data.messages;
    if (state.folder === 'starred') {
      state.messages = state.messages.filter(m => m.is_starred);
    }
    renderMessageList();
    setStatus(`${state.messages.length} messages`);
  } else {
    state.messages = [];
    renderMessageList();
    setStatus('Error loading messages');
  }
}

async function loadMessage(id) {
  const data = await apiCall('GET', `/api/mail/${state.mailbox}/${id}`);
  if (data && !data.error) {
    state.selectedId = id;
    state.selectedMsg = data;
    renderReader();

    // Mark as read
    if (!data.is_read) {
      apiCall('POST', `/api/mail/${state.mailbox}/${id}/read`);
      const item = state.messages.find(m => m.id === id);
      if (item) item.is_read = 1;
      renderMessageList();
    }
  }
}

// ─── Rendering ─────────────────────────────────────────────

function renderFolders() {
  const el = document.getElementById('folder-list');
  el.innerHTML = FOLDERS.map(f => `
    <div class="folder-item ${f.id === state.folder ? 'active' : ''}"
         onclick="selectFolder('${f.id}')">
      <span>${f.name}</span>
      <span class="count" id="count-${f.id}">-</span>
    </div>
  `).join('');
}

function renderMailboxes() {
  const el = document.getElementById('mailbox-list');
  el.innerHTML = MAILBOXES.map(m => `
    <div class="folder-item ${m === state.mailbox ? 'active' : ''}"
         onclick="selectMailbox('${m}')">
      <span>${m}@</span>
    </div>
  `).join('');
}

function renderMessageList() {
  const el = document.getElementById('list-body');

  if (!state.messages.length) {
    el.innerHTML = '<div class="list-empty">No messages</div>';
    return;
  }

  el.innerHTML = state.messages.map(m => {
    const isUnread = !m.is_read;
    const isSelected = m.id === state.selectedId;
    const date = formatDate(m.received_at);
    const from = m.from_name || m.from_address || '';
    const preview = (m.body_text || '').slice(0, 80);
    const hasAtt = m.has_attachments ? '<span class="msg-attach-badge">📎</span>' : '';

    return `
      <div class="msg-item ${isUnread ? 'unread' : ''} ${isSelected ? 'selected' : ''}"
           onclick="loadMessage('${m.id}')">
        <div class="msg-from">
          <span>${esc(from)}${hasAtt}</span>
          <span class="msg-date">${date}</span>
        </div>
        <div class="msg-subject">${esc(m.subject || '(no subject)')}</div>
        <div class="msg-preview">${esc(preview)}</div>
        <span class="msg-star ${m.is_starred ? 'starred' : ''}"
              onclick="event.stopPropagation(); toggleStar('${m.id}')">
          ${m.is_starred ? '★' : '☆'}
        </span>
      </div>
    `;
  }).join('');
}

function renderReader() {
  const msg = state.selectedMsg;
  if (!msg) return;

  document.getElementById('reader-empty').style.display = 'none';
  document.getElementById('reader-content').style.display = 'flex';
  document.getElementById('reader-content').style.flexDirection = 'column';
  document.getElementById('reader-content').style.height = '100%';

  document.getElementById('r-subject').textContent = msg.subject || '(no subject)';
  document.getElementById('r-from').textContent = msg.from_name
    ? `${msg.from_name} <${msg.from_address}>`
    : msg.from_address;
  document.getElementById('r-date').textContent = formatDateFull(msg.received_at);

  const toAddrs = tryParseJSON(msg.to_addresses) || [];
  document.getElementById('r-to').textContent = `To: ${toAddrs.join(', ')}`;

  // Body — prefer text for now, HTML later
  const bodyEl = document.getElementById('r-body');
  bodyEl.textContent = msg.body_text || msg.body_html || '';

  // Attachments
  const attEl = document.getElementById('r-attachments');
  const attList = document.getElementById('r-att-list');
  if (msg.attachments && msg.attachments.length) {
    attEl.style.display = 'block';
    attList.innerHTML = msg.attachments.map(a => `
      <span class="att-item" onclick="downloadAttachment('${msg.id}', '${a.id}', '${esc(a.filename)}')">
        ${esc(a.filename)}
        <span class="att-size">${formatSize(a.size_bytes)}</span>
      </span>
    `).join('');
  } else {
    attEl.style.display = 'none';
  }
}

// ─── Actions ───────────────────────────────────────────────

function selectFolder(folder) {
  state.folder = folder;
  state.selectedId = null;
  state.selectedMsg = null;
  document.getElementById('reader-empty').style.display = 'flex';
  document.getElementById('reader-content').style.display = 'none';
  document.getElementById('list-title').textContent =
    FOLDERS.find(f => f.id === folder)?.name || folder;
  renderFolders();
  loadMessages();
}

function selectMailbox(mailbox) {
  state.mailbox = mailbox;
  state.folder = 'inbox';
  state.selectedId = null;
  state.selectedMsg = null;
  document.getElementById('reader-empty').style.display = 'flex';
  document.getElementById('reader-content').style.display = 'none';
  document.getElementById('operator-label').textContent = mailbox + '@zeropoint.global';
  document.getElementById('list-title').textContent = 'Inbox';
  renderMailboxes();
  renderFolders();
  loadMessages();
}

async function toggleStar(id) {
  await apiCall('POST', `/api/mail/${state.mailbox}/${id}/star`);
  const msg = state.messages.find(m => m.id === id);
  if (msg) msg.is_starred = msg.is_starred ? 0 : 1;
  renderMessageList();
}

async function archiveMessage() {
  if (!state.selectedId) return;
  await apiCall('POST', `/api/mail/${state.mailbox}/${state.selectedId}/move`, { folder: 'archive' });
  state.messages = state.messages.filter(m => m.id !== state.selectedId);
  state.selectedId = null;
  state.selectedMsg = null;
  document.getElementById('reader-empty').style.display = 'flex';
  document.getElementById('reader-content').style.display = 'none';
  renderMessageList();
  setStatus('Archived');
}

async function deleteMessage() {
  if (!state.selectedId) return;
  await apiCall('POST', `/api/mail/${state.mailbox}/${state.selectedId}/move`, { folder: 'trash' });
  state.messages = state.messages.filter(m => m.id !== state.selectedId);
  state.selectedId = null;
  state.selectedMsg = null;
  document.getElementById('reader-empty').style.display = 'flex';
  document.getElementById('reader-content').style.display = 'none';
  renderMessageList();
  setStatus('Moved to trash');
}

function downloadAttachment(msgId, attId, filename) {
  window.open(`${API}/api/mail/${state.mailbox}/${msgId}/attachments/${attId}`, '_blank');
}

function filterMessages() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const items = document.querySelectorAll('.msg-item');
  items.forEach((item, i) => {
    const msg = state.messages[i];
    if (!msg) return;
    const text = `${msg.from_address} ${msg.from_name || ''} ${msg.subject || ''} ${msg.body_text || ''}`.toLowerCase();
    item.style.display = text.includes(q) ? '' : 'none';
  });
}

// ─── Compose ───────────────────────────────────────────────

function openCompose(replyMsg) {
  state.replyTo = replyMsg || null;
  document.getElementById('compose-overlay').classList.add('open');
  document.getElementById('c-from').value = `${state.mailbox}@zeropoint.global`;
  document.getElementById('compose-status').textContent = '';

  if (replyMsg) {
    document.getElementById('compose-title-text').textContent = 'Reply';
    document.getElementById('c-to').value = replyMsg.from_address;
    document.getElementById('c-subject').value =
      replyMsg.subject?.startsWith('Re:') ? replyMsg.subject : `Re: ${replyMsg.subject}`;
    document.getElementById('c-body').value =
      `\n\nOn ${formatDateFull(replyMsg.received_at)}, ${replyMsg.from_name || replyMsg.from_address} wrote:\n> ${(replyMsg.body_text || '').split('\n').join('\n> ')}`;
    document.getElementById('c-body').focus();
    document.getElementById('c-body').setSelectionRange(0, 0);
  } else {
    document.getElementById('compose-title-text').textContent = 'New Message';
    document.getElementById('c-to').value = '';
    document.getElementById('c-subject').value = '';
    document.getElementById('c-body').value = '';
    document.getElementById('c-to').focus();
  }
}

function closeCompose() {
  document.getElementById('compose-overlay').classList.remove('open');
  state.replyTo = null;
}

function replyToMessage() {
  if (state.selectedMsg) openCompose(state.selectedMsg);
}

async function sendMessage() {
  const btn = document.getElementById('send-btn');
  const statusEl = document.getElementById('compose-status');
  btn.disabled = true;
  statusEl.textContent = 'Sending...';

  const to = document.getElementById('c-to').value.trim();
  const subject = document.getElementById('c-subject').value.trim();
  const text = document.getElementById('c-body').value;

  if (!to || !subject) {
    statusEl.textContent = 'To and Subject are required';
    btn.disabled = false;
    return;
  }

  const payload = {
    to: to.split(',').map(s => s.trim()),
    subject,
    text,
  };

  if (state.replyTo?.message_id_header) {
    payload.inReplyTo = state.replyTo.message_id_header;
  }

  const result = await apiCall('POST', `/api/mail/${state.mailbox}/send`, payload);

  if (result.ok) {
    statusEl.textContent = 'Sent';
    setStatus('Message sent');
    setTimeout(closeCompose, 800);
  } else {
    statusEl.textContent = `Error: ${result.error}`;
  }
  btn.disabled = false;
}

// ─── Utilities ─────────────────────────────────────────────

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function formatDateFull(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString([], {
    weekday: 'short', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}

function formatSize(bytes) {
  if (!bytes) return '0 B';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(0) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function tryParseJSON(s) {
  try { return JSON.parse(s); } catch { return null; }
}

function setStatus(text) {
  document.getElementById('status-text').textContent = text;
}

// ─── Keyboard Shortcuts ────────────────────────────────────

document.addEventListener('keydown', (e) => {
  // Escape closes compose
  if (e.key === 'Escape') closeCompose();

  // Don't intercept typing in inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if (e.key === 'c') openCompose();
  if (e.key === 'r' && state.selectedMsg) replyToMessage();
  if (e.key === 'e' && state.selectedId) archiveMessage();
  if (e.key === '#' && state.selectedId) deleteMessage();

  // j/k navigation
  if (e.key === 'j' || e.key === 'k') {
    const idx = state.messages.findIndex(m => m.id === state.selectedId);
    const next = e.key === 'j' ? idx + 1 : idx - 1;
    if (next >= 0 && next < state.messages.length) {
      loadMessage(state.messages[next].id);
    }
  }
});

// ─── Init ──────────────────────────────────────────────────

function init() {
  document.getElementById('operator-label').textContent =
    state.mailbox + '@zeropoint.global';
  renderFolders();
  renderMailboxes();
  loadMessages();
}

init();
</script>
