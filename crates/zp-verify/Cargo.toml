[package]
name = "zp-verify"
version = "0.1.0"
edition = "2021"
description = "ZeroPoint Invariant Catalog verifier — parses receipt chains against the catalog grammar (P1, M3, M4 in v0)"
license = "MIT OR Apache-2.0"

# Deliberately minimal dependencies. zp-verify is a spec checker, not a runtime.
# It depends only on zp-receipt (which is itself a minimal protocol primitive)
# and serde for the report format. No async, no DB, no network.

[dependencies]
zp-receipt = { path = "../zp-receipt", default-features = false }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
chrono = { workspace = true }
