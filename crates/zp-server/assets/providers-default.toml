# ─────────────────────────────────────────────────────────────
# ZeroPoint — Default Provider Catalog
# Embedded in the binary via include_str!
# User overrides: ~/.zeropoint/config/providers.toml
# ─────────────────────────────────────────────────────────────
# Each [[providers]] entry is a known AI/LLM service.
# The onboarding engine uses this catalog for:
#   1. Environment variable scanning (detect which providers the user has keys for)
#   2. Credential collection UI (show provider cards with "get your key" links)
#   3. Governance proxy routing (know where each provider's API lives)
#
# Fields:
#   id               — unique slug (used in vault refs, proxy config)
#   name             — human-readable display name
#   category         — "llm" | "embedding" | "platform" | "aggregator" | "search" | "ledger"
#   env_patterns     — env var names the provider's SDK expects
#   key_hint         — what the key looks like (prefix, length)
#   base_url         — API base URL
#   key_url          — where the user creates/manages keys
#   docs_url         — main documentation
#   supports_org     — whether org-level keys exist
#   source_url       — canonical reference for this entry
#   last_verified    — ISO date when this entry was last checked
#   capabilities     — list of MVC capability IDs this provider satisfies
#   openai_compatible — whether the provider exposes OpenAI-compatible /v1/chat/completions
#   aggregator       — whether this is a multi-model routing service
#   routing          — "intelligent" (auto-selects model) or "explicit" (user picks model)
# ─────────────────────────────────────────────────────────────

# ── LLM / Foundation Model APIs ─────────────────────────────

[[providers]]
id = "openai"
name = "OpenAI"
category = "llm"
env_patterns = ["OPENAI_API_KEY"]
key_hint = "starts with sk-proj-"
base_url = "https://api.openai.com/v1"
key_url = "https://platform.openai.com/api-keys"
docs_url = "https://platform.openai.com/docs/api-reference"
supports_org = true
source_url = "https://platform.openai.com/docs/api-reference/introduction"
