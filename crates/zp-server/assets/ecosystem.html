<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ZeroPoint Ecosystem Graph + Provenance Chain</title>
<link rel="stylesheet" href="/assets/fonts/fonts.css">
<script src="/assets/vendor/d3.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0c; color: #e4e4e7; overflow: hidden; }

#container { display: flex; height: 100vh; }
#graph-panel { flex: 1; position: relative; }
#side-panel {
  width: 400px; background: #111114; border-left: 1px solid #2a2a30;
  display: flex; flex-direction: column; overflow: hidden;
}

/* Tabs */
.tab-bar {
  display: flex; border-bottom: 1px solid #2a2a30; flex-shrink: 0;
}
.tab {
  flex: 1; padding: 10px 8px; text-align: center; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase; color: #52525b; border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab:hover { color: #71717a; }
.tab.active { color: #7eb8da; border-bottom-color: #7eb8da; }
.tab-content { display: none; flex: 1; overflow-y: auto; padding: 16px; }
.tab-content.active { display: block; }

/* Headers */
h1 { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #7eb8da; margin-bottom: 4px; letter-spacing: 0.12em; text-transform: uppercase; }
h2 { font-size: 11px; color: #52525b; margin-bottom: 16px; font-weight: 300; }
h3 { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #7eb8da; margin: 16px 0 8px; letter-spacing: 0.08em; text-transform: uppercase; }

/* Stats */
.stats { display: flex; gap: 16px; margin-bottom: 16px; }
.stat { text-align: center; flex: 1; padding: 8px; background: #18181c; border-radius: 6px; border: 1px solid #2a2a30; }
.stat-val { font-family: 'JetBrains Mono', monospace; font-size: 22px; color: #7eb8da; font-weight: 600; }
.stat-label { font-size: 9px; color: #52525b; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

/* Receipt cards */
.receipt-card {
  background: #18181c; border: 1px solid #2a2a30; border-radius: 6px;
  padding: 12px; margin-bottom: 8px; font-size: 11px; transition: border-color 0.2s; cursor: default;
}
.receipt-card:hover { border-color: #7eb8da; }
.receipt-id { font-family: 'JetBrains Mono', monospace; color: #7eb8da; font-weight: 600; font-size: 10px; }
.receipt-hash { font-family: 'JetBrains Mono', monospace; color: #52525b; font-size: 9px; word-break: break-all; margin-top: 2px; }
.receipt-desc { color: #a1a1aa; margin-top: 6px; line-height: 1.4; }
.receipt-meta { font-family: 'JetBrains Mono', monospace; color: #3f3f46; font-size: 9px; margin-top: 4px; }
.chain-arrow { text-align: center; color: #2a2a30; font-size: 16px; margin: 2px 0; }
.chain-arrow.valid { color: #4ade80; }

/* Live state */
.live-tool {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 10px; background: #18181c; border-radius: 6px; border: 1px solid #2a2a30; margin-bottom: 6px;
}
.live-tool-name { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.status-pill {
  font-family: 'JetBrains Mono', monospace; font-size: 9px; padding: 2px 8px;
  border-radius: 10px; letter-spacing: 0.05em;
}
.status-running { background: rgba(74,222,128,0.12); color: #4ade80; }
.status-configured { background: rgba(251,191,36,0.12); color: #fbbf24; }
.status-stopped { background: rgba(113,113,122,0.12); color: #71717a; }
.status-error { background: rgba(248,113,113,0.12); color: #f87171; }
.engine-card {
  padding: 10px; background: #18181c; border: 1px solid #2a2a30; border-radius: 6px; margin-bottom: 8px;
}
.engine-name { font-family: 'JetBrains Mono', monospace; color: #a78bfa; font-size: 11px; font-weight: 600; }
.engine-detail { font-size: 10px; color: #71717a; margin-top: 4px; }
.refresh-btn {
  background: #18181c; border: 1px solid #2a2a30; color: #e4e4e7; font-family: 'JetBrains Mono', monospace;
  padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 10px; transition: all 0.2s;
}
.refresh-btn:hover { border-color: #7eb8da; color: #7eb8da; }
.offline-msg { color: #52525b; font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 12px; text-align: center; }

/* Tool card expanded */
.tool-card {
  background: #18181c; border: 1px solid #2a2a30; border-radius: 6px; margin-bottom: 8px;
  overflow: hidden; transition: border-color 0.2s;
}
.tool-card:hover { border-color: #3f3f46; }
.tool-card.has-issues { border-color: rgba(248,113,113,0.3); }
.tool-card-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 12px; cursor: pointer; user-select: none;
}
.tool-card-header:hover { background: #1c1c20; }
.tool-name-row { display: flex; align-items: center; gap: 8px; }
.tool-card-body { display: none; padding: 0 12px 12px; }
.tool-card.expanded .tool-card-body { display: block; }
.tool-chevron { color: #3f3f46; font-size: 10px; transition: transform 0.2s; }
.tool-card.expanded .tool-chevron { transform: rotate(90deg); }

/* Issue cards */
.issue-card {
  background: #0a0a0c; border: 1px solid #2a2a30; border-radius: 4px;
  padding: 8px 10px; margin-top: 6px; font-size: 10px;
}
.issue-card.severity-critical { border-left: 3px solid #f87171; }
.issue-card.severity-warning { border-left: 3px solid #fbbf24; }
.issue-card.severity-info { border-left: 3px solid #52525b; }
.issue-type { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #52525b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
.issue-text { color: #a1a1aa; line-height: 1.4; word-break: break-word; }
.issue-remedy {
  margin-top: 6px; padding-top: 6px; border-top: 1px solid #2a2a30;
  display: flex; justify-content: space-between; align-items: center;
}
.remedy-text { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #71717a; }
.remedy-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 9px; padding: 3px 10px;
  border-radius: 4px; cursor: pointer; border: 1px solid; transition: all 0.2s;
}
.remedy-btn.action { background: rgba(126,184,218,0.08); border-color: #4a7a9a; color: #7eb8da; }
.remedy-btn.action:hover { background: rgba(126,184,218,0.18); border-color: #7eb8da; }
.remedy-btn.manual { background: rgba(113,113,122,0.08); border-color: #3f3f46; color: #71717a; }
.remedy-btn.manual:hover { background: rgba(113,113,122,0.15); }
.remedy-btn.destructive { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.3); color: #f87171; }
.remedy-btn.destructive:hover { background: rgba(248,113,113,0.18); }
.remedy-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Tool meta */
.tool-meta-row {
  display: flex; gap: 12px; padding: 4px 0; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #52525b;
}
.tool-meta-row span { color: #71717a; }
.tool-providers {
  display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
}
.provider-pill {
  font-family: 'JetBrains Mono', monospace; font-size: 8px; padding: 2px 6px;
  border-radius: 3px; background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.2); color: #fbbf24;
}
.provider-pill.resolved { background: rgba(74,222,128,0.08); border-color: rgba(74,222,128,0.2); color: #4ade80; }

/* Graph */
svg { width: 100%; height: 100%; }
.node circle { stroke-width: 2; cursor: pointer; transition: stroke-width 0.15s; }
.node circle:hover { stroke-width: 3; }
.node text { font-family: 'Inter', sans-serif; font-size: 10px; fill: #a1a1aa; pointer-events: none; }
.link { stroke-opacity: 0.4; }
.link-label { font-family: 'JetBrains Mono', monospace; font-size: 8px; fill: #3f3f46; pointer-events: none; }

.node-tooltip {
  position: absolute; background: #18181c; border: 1px solid #7eb8da; border-radius: 6px;
  padding: 10px 14px; font-size: 11px; pointer-events: none; display: none; z-index: 10;
  max-width: 280px; line-height: 1.4; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.tooltip-type { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #52525b; text-transform: uppercase; letter-spacing: 0.08em; }
.tooltip-name { font-weight: 600; color: #e4e4e7; margin: 2px 0 4px; }
.tooltip-desc { color: #a1a1aa; font-size: 10px; }

.legend { position: absolute; bottom: 20px; left: 20px; font-size: 10px; background: rgba(17,17,20,0.85); padding: 12px 16px; border-radius: 8px; border: 1px solid #2a2a30; }
.legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; color: #71717a; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

.title-bar { position: absolute; top: 16px; left: 20px; z-index: 5; }

/* Search */
.search-bar {
  position: absolute; top: 16px; right: 420px; z-index: 5;
}
.search-input {
  background: #18181c; border: 1px solid #2a2a30; border-radius: 6px; color: #e4e4e7;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 8px 12px; width: 220px;
  outline: none; transition: border-color 0.2s;
}
.search-input:focus { border-color: #7eb8da; }
.search-input::placeholder { color: #3f3f46; }

/* Filter pills */
.filter-bar {
  position: absolute; top: 60px; left: 20px; z-index: 5; display: flex; gap: 6px; flex-wrap: wrap;
}
.filter-pill {
  font-family: 'JetBrains Mono', monospace; font-size: 9px; padding: 3px 10px; border-radius: 12px;
  cursor: pointer; border: 1px solid #2a2a30; background: transparent; color: #52525b;
  transition: all 0.2s; letter-spacing: 0.04em;
}
.filter-pill.active { border-color: currentColor; background: rgba(126,184,218,0.08); }
</style>
</head>
<body>
<div id="container">
  <div id="graph-panel">
    <div class="title-bar">
      <h1>ZeroPoint Ecosystem</h1>
      <h2>Architecture + Knowledge Graph + Live State</h2>
    </div>
    <div class="search-bar">
      <input type="text" class="search-input" id="search" placeholder="Search nodes..." />
    </div>
    <div class="filter-bar" id="filters"></div>
    <svg id="graph"></svg>
    <div class="legend" id="legend"></div>
    <div class="node-tooltip" id="tooltip"></div>
  </div>
  <div id="side-panel">
    <div class="tab-bar">
      <div class="tab active" data-tab="receipts">Receipts</div>
      <div class="tab" data-tab="live">Live State</div>
      <div class="tab" data-tab="detail">Node Detail</div>
    </div>

    <!-- Receipts tab -->
    <div class="tab-content active" id="tab-receipts">
      <div class="stats">
        <div class="stat"><div class="stat-val" id="node-count">0</div><div class="stat-label">Nodes</div></div>
        <div class="stat"><div class="stat-val" id="edge-count">0</div><div class="stat-label">Edges</div></div>
        <div class="stat"><div class="stat-val" id="receipt-count">0</div><div class="stat-label">Receipts</div></div>
      </div>
      <h3>Chain Integrity</h3>
      <div id="chain-status" style="font-size:11px;margin-bottom:12px;"></div>
      <h3>Provenance Trail</h3>
      <div id="receipt-list"></div>
    </div>

    <!-- Live State tab -->
    <div class="tab-content" id="tab-live">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="margin:0">System State</h3>
        <button class="refresh-btn" id="refresh-btn" data-action="refresh-live-state">Refresh</button>
      </div>
      <div id="live-tools"></div>
      <h3>Analysis Engines</h3>
      <div id="live-engines"></div>
      <h3>Server</h3>
      <div id="live-server"></div>
    </div>

    <!-- Node Detail tab -->
    <div class="tab-content" id="tab-detail">
      <div id="detail-content">
        <div class="offline-msg">Click a node in the graph to see details</div>
      </div>
    </div>
  </div>
</div>

<script src="/assets/ecosystem.js"></script>
</body>
</html>
