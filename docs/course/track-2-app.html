<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// Parse course data
const courseData = JSON.parse(document.getElementById('course-data').textContent);

// Custom markdown renderer with Prism highlighting
function renderMarkdown(md) {
  if (!md) return '';

  // Process code blocks first
  const codeBlocks = [];
  let processed = md.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push({ lang: lang || 'text', code: code.trimEnd() });
    return `%%CODEBLOCK_${idx}%%`;
  });

  // Basic markdown to HTML
  processed = processed
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');

  // Wrap in paragraphs
  if (!processed.startsWith('<')) processed = '<p>' + processed + '</p>';

  // Restore code blocks as placeholders (we'll render them as React components)
  processed = processed.replace(/%%CODEBLOCK_(\d+)%%/g, (_, idx) => {
    const block = codeBlocks[parseInt(idx)];
    let highlighted;
    try {
      const grammar = Prism.languages[block.lang] || Prism.languages.clike;
      highlighted = Prism.highlight(block.code, grammar, block.lang);
    } catch (e) {
      highlighted = block.code.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    return `<div class="code-block" data-lang="${block.lang}" data-code="${encodeURIComponent(block.code)}"><div class="code-block-header"><span class="code-lang">${block.lang}</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre class="language-${block.lang}"><code class="language-${block.lang}">${highlighted}</code></pre></div>`;
  });

  return processed;
}

// Global copy function
window.copyCode = function(btn) {
  const block = btn.closest('.code-block');
  const code = decodeURIComponent(block.dataset.code);
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  });
};

// Components
function IntroPage({ onStart }) {
  return (
    <div className="content-wrapper">
      <div className="hero">
        <div className="hero-badge">ZeroPoint Academy</div>
        <h1>Track 2: Builder</h1>
        <p>{courseData.tagline}</p>
        <div className="hero-meta">
          <span><span className="val">{courseData.duration}</span></span>
          <span><span className="val">{courseData.modules.length} Modules</span></span>
          <span><span className="val">Rust</span></span>
        </div>
      </div>

      <div className="intro-grid">
        <div className="intro-card">
          <h3>Concept</h3>
          <p>What you're building and why it matters, drawn from the book.</p>
        </div>
        <div className="intro-card">
          <h3>Lab</h3>
          <p>Hands-on code you write and run against a real ZeroPoint instance.</p>
        </div>
        <div className="intro-card">
          <h3>Checkpoint</h3>
          <p>A verification exercise that proves you understood the module.</p>
        </div>
      </div>

      <div className="philosophy-text">
        <p>You should type the code, not copy it. The muscle memory matters. When a lab says "verify that X," it means run the code and confirm the output matches expectations.</p>
        <p>The modules are sequential. Each builds on the previous. Do not skip ahead.</p>
      </div>

      <div style={{ marginTop: '24px' }}>
        <p style={{ fontSize: '0.85rem', color: 'var(--text-dim)', marginBottom: '8px' }}><strong>Prerequisites:</strong> {courseData.prereqs}</p>
        <p style={{ fontSize: '0.85rem', color: 'var(--text-dim)' }}><strong>Outcome:</strong> {courseData.outcome}</p>
      </div>

      <div style={{ textAlign: 'center', marginTop: '40px' }}>
        <button className="nav-btn primary" onClick={onStart} style={{ padding: '12px 32px', fontSize: '0.9rem' }}>
          Begin Module 1 &rarr;
        </button>
      </div>
    </div>
  );
}

function ModulePage({ module, completed, onComplete, onPrev, onNext, hasPrev, hasNext }) {
  const [activeTab, setActiveTab] = useState('concept');
  const contentRef = useRef(null);

  useEffect(() => {
    setActiveTab('concept');
    if (contentRef.current) {
      contentRef.current.scrollTop = 0;
    }
  }, [module.id]);

  const sections = {
    concept: module.concept,
    lab: module.lab,
    checkpoint: module.checkpoint,
  };

  const html = useMemo(() => renderMarkdown(sections[activeTab]), [module.id, activeTab]);

  return (
    <div className="content-wrapper" ref={contentRef}>
      <div className="module-header">
        <div className="module-header-num">Module {module.id} of {courseData.modules.length - 1}</div>
        <h1>{module.title}</h1>
      </div>

      <div className="section-tabs">
        {['concept', 'lab', 'checkpoint'].map(tab => (
          <button
            key={tab}
            className={`section-tab ${activeTab === tab ? 'active' : ''}`}
            onClick={() => setActiveTab(tab)}
          >
            {tab.charAt(0).toUpperCase() + tab.slice(1)}
          </button>
        ))}
      </div>

      <div className="section-content" dangerouslySetInnerHTML={{ __html: html }} />

      {activeTab === 'checkpoint' && (
        <div className="complete-section">
          <button
            className={`complete-btn ${completed ? 'completed' : ''}`}
            onClick={() => !completed && onComplete(module.id)}
          >
            {completed ? '\u2713 Module Completed' : 'Mark as Complete'}
          </button>
        </div>
      )}

      <div className="nav-buttons">
        <button className="nav-btn" onClick={onPrev} disabled={!hasPrev}>
          &larr; Previous
        </button>
        {hasNext ? (
          <button className="nav-btn primary" onClick={onNext}>
            Next Module &rarr;
          </button>
        ) : (
          <span style={{ fontSize: '0.85rem', color: 'var(--green)', fontWeight: 500 }}>
            {completed ? '\u2713 Course Complete' : 'Final Module'}
          </span>
        )}
      </div>
    </div>
  );
}

// ============================================================================
// API Configuration
// ============================================================================
// The course app talks to the ZeroPoint server (zp-server on Hetzner) for two
// purposes:
//   1. Anonymous analytics — module start/complete events with no identity
//   2. Attestation issuance — when all 14 modules are complete, the builder
//      enters their name and receives a signed, hash-chained attestation
//
// The API_BASE should point to the zp-server instance. In production this is
// proxied through Cloudflare at zeropoint.global. For local dev, point it at
// localhost:3000.
// ============================================================================
const API_BASE = 'https://api.zeropoint.global';
const TRACK_ID = 'track-2-builder';

// Generate a random session ID for anonymous analytics.
// This groups events within a single learning session but cannot identify
// a person. It's regenerated each time the page loads.
const SESSION_ID = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);

// Fire an anonymous analytics event to the server.
// Failures are silently ignored — analytics should never block learning.
function sendAnalyticsEvent(moduleId, event, durationSecs) {
  fetch(`${API_BASE}/api/v1/analytics/event`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      session_id: SESSION_ID,
      track: TRACK_ID,
      module_id: moduleId,
      event: event,
      duration_secs: durationSecs || null,
    }),
  }).catch(() => {}); // Silent — never block the learner
}

// Request an attestation from the server when all modules are complete.
// Returns the attestation object (id, hash, signature) or null on failure.
async function requestAttestation(name, completions) {
  try {
    const res = await fetch(`${API_BASE}/api/v1/attestations`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: name,
        track: TRACK_ID,
        completions: completions,
      }),
    });
    if (res.ok) return await res.json();
    return null;
  } catch (e) {
    return null;
  }
}

function App() {
  const [currentModule, setCurrentModule] = useState(0); // 0 = intro
  const [completedModules, setCompletedModules] = useState(new Set());
  const [sidebarOpen, setSidebarOpen] = useState(false);
  // Track when each module was started (for duration calculation)
  const moduleStartTimes = useRef({});
  // Track when each module was completed (for attestation payload)
  const completionTimestamps = useRef({});
  // Attestation state
  const [showAttestationModal, setShowAttestationModal] = useState(false);
  const [attestation, setAttestation] = useState(null);
  const [attestationLoading, setAttestationLoading] = useState(false);
  const mainRef = useRef(null);

  const goTo = useCallback((idx) => {
    setCurrentModule(idx);
    setSidebarOpen(false); // Close sidebar on mobile after selection
    if (mainRef.current) mainRef.current.scrollTop = 0;

    // Fire "started" analytics event when entering a module
    if (idx > 0) {
      moduleStartTimes.current[idx] = Date.now();
      sendAnalyticsEvent(idx, 'started');
    }
  }, []);

  const handleComplete = useCallback((id) => {
    // Calculate time spent on this module (seconds)
    const startTime = moduleStartTimes.current[id];
    const durationSecs = startTime ? Math.round((Date.now() - startTime) / 1000) : null;

    // Record completion timestamp for the attestation payload
    completionTimestamps.current[id] = new Date().toISOString();

    // Fire "completed" analytics event with duration
    sendAnalyticsEvent(id, 'completed', durationSecs);

    setCompletedModules(prev => {
      const next = new Set(prev);
      next.add(id);

      // If all 14 modules are now complete, show the attestation modal
      if (next.size === courseData.modules.length) {
        setTimeout(() => setShowAttestationModal(true), 600);
      }

      return next;
    });
  }, []);

  // Handle attestation request when the builder submits their name
  const handleAttestationRequest = useCallback(async (name) => {
    setAttestationLoading(true);
    const completions = courseData.modules.map(mod => ({
      module_id: mod.id,
      module_name: mod.title,
      completed_at: completionTimestamps.current[mod.id] || new Date().toISOString(),
    }));
    const result = await requestAttestation(name, completions);
    setAttestation(result);
    setAttestationLoading(false);
  }, []);

  const progress = (completedModules.size / courseData.modules.length) * 100;

  return (
    <div className="app">
      <button
        className={`hamburger ${sidebarOpen ? 'open' : ''}`}
        onClick={() => setSidebarOpen(!sidebarOpen)}
        aria-label="Toggle navigation"
      >
        <span /><span /><span />
      </button>
      <div
        className={`sidebar-overlay ${sidebarOpen ? 'visible' : ''}`}
        onClick={() => setSidebarOpen(false)}
      />
      <div className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
        <div className="sidebar-header">
          <div className="sidebar-logo">ZeroPoint</div>
          <div className="sidebar-title">Track 2: Builder</div>
          <div className="sidebar-subtitle">Developer Course</div>
        </div>

        <div className="progress-section">
          <div className="progress-label">
            <span>Progress</span>
            <span>{completedModules.size}/{courseData.modules.length}</span>
          </div>
          <div className="progress-bar">
            <div className="progress-fill" style={{ width: `${progress}%` }} />
          </div>
        </div>

        <div className="module-list">
          <div
            className={`module-item intro ${currentModule === 0 ? 'active' : ''}`}
            onClick={() => goTo(0)}
          >
            <div className="module-num" style={{ fontWeight: 500 }}>&bull;</div>
            <div className="module-info">
              <div className="module-name">Introduction</div>
            </div>
          </div>

          {courseData.modules.map((mod, idx) => {
            const isDone = completedModules.has(mod.id);
            const isActive = currentModule === mod.id;
            return (
              <div
                key={mod.id}
                className={`module-item ${isActive ? 'active' : ''}`}
                onClick={() => goTo(mod.id)}
              >
                <div className="module-num">{String(mod.id).padStart(2, '0')}</div>
                <div className="module-info">
                  <div className="module-name">{mod.title}</div>
                </div>
                <div className="module-check">
                  {isDone ? (
                    <span className="check-done">{'\u2713'}</span>
                  ) : isActive ? (
                    <span className="check-active">{'\u25CB'}</span>
                  ) : (
                    <span className="check-pending">{'\u25CB'}</span>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="main" ref={mainRef}>
        {currentModule === 0 ? (
          <IntroPage onStart={() => goTo(1)} />
        ) : (
          <ModulePage
            module={courseData.modules[currentModule - 1]}
            completed={completedModules.has(currentModule)}
            onComplete={handleComplete}
            onPrev={() => goTo(currentModule - 1)}
            onNext={() => goTo(currentModule + 1)}
            hasPrev={currentModule > 0}
            hasNext={currentModule < courseData.modules.length}
          />
        )}
      </div>

      {/* ================================================================
          Attestation Modal
          Shown when all 14 modules are marked complete. The builder enters
          their name, the app calls POST /api/v1/attestations, and on
          success displays the attestation ID with a link to the visual
          verification page.
          ================================================================ */}
      {showAttestationModal && (
        <div style={{
          position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
          background: 'rgba(0,0,0,0.85)', display: 'flex',
          justifyContent: 'center', alignItems: 'center', zIndex: 100,
          backdropFilter: 'blur(8px)',
        }}>
          <div style={{
            background: 'var(--bg-surface)', border: '1px solid var(--border)',
            borderRadius: '8px', padding: '40px', width: '440px', textAlign: 'center',
          }}>
            {!attestation ? (
              <>
                <div style={{
                  fontSize: '0.65rem', fontWeight: 600, letterSpacing: '0.15em',
                  textTransform: 'uppercase', color: 'var(--green)', marginBottom: '12px',
                }}>
                  {'\u2713'} All Modules Complete
                </div>
                <h2 style={{
                  fontFamily: "'Inter', sans-serif", fontSize: '1.4rem',
                  fontWeight: 600, color: 'var(--text)', marginBottom: '8px',
                }}>
                  You are a ZeroPoint Builder.
                </h2>
                <p style={{
                  fontSize: '0.85rem', color: 'var(--text-dim)',
                  marginBottom: '28px', lineHeight: 1.6,
                }}>
                  Enter your name to issue a signed attestation of completion,
                  hash-chained to the ZeroPoint attestation ledger.
                </p>
                <input
                  type="text"
                  id="attestation-name"
                  placeholder="Your full name"
                  style={{
                    width: '100%', padding: '10px 14px', background: 'var(--bg)',
                    border: '1px solid var(--border)', borderRadius: '4px',
                    color: 'var(--text)', fontFamily: "'Inter', sans-serif",
                    fontSize: '15px', outline: 'none', marginBottom: '16px',
                  }}
                  onFocus={(e) => e.target.style.borderColor = 'var(--accent)'}
                  onBlur={(e) => e.target.style.borderColor = 'var(--border)'}
                />
                <button
                  onClick={() => {
                    const name = document.getElementById('attestation-name').value.trim();
                    if (name) handleAttestationRequest(name);
                  }}
                  disabled={attestationLoading}
                  style={{
                    width: '100%', padding: '12px', borderRadius: '4px',
                    border: '1px solid rgba(126,184,218,0.3)',
                    background: attestationLoading ? 'var(--bg-hover)' : 'var(--accent-glow)',
                    color: attestationLoading ? 'var(--text-muted)' : 'var(--accent)',
                    fontFamily: "'Inter', sans-serif", fontSize: '14px',
                    fontWeight: 500, cursor: attestationLoading ? 'wait' : 'pointer',
                  }}
                >
                  {attestationLoading ? 'Sealing attestation...' : 'Issue Attestation'}
                </button>
                <button
                  onClick={() => setShowAttestationModal(false)}
                  style={{
                    width: '100%', padding: '8px', marginTop: '8px',
                    background: 'transparent', border: 'none',
                    color: 'var(--text-muted)', fontFamily: "'Inter', sans-serif",
                    fontSize: '0.8rem', cursor: 'pointer',
                  }}
                >
                  Skip for now
                </button>
              </>
            ) : (
              <>
                <div style={{
                  width: '56px', height: '56px', borderRadius: '50%',
                  border: '2px solid var(--green)', display: 'flex',
                  alignItems: 'center', justifyContent: 'center',
                  margin: '0 auto 16px', fontSize: '24px', color: 'var(--green)',
                }}>
                  {'\u2713'}
                </div>
                <h2 style={{
                  fontFamily: "'Inter', sans-serif", fontSize: '1.3rem',
                  fontWeight: 600, color: 'var(--text)', marginBottom: '8px',
                }}>
                  Attestation Sealed
                </h2>
                <div style={{
                  fontFamily: "'JetBrains Mono', monospace", fontSize: '0.85rem',
                  color: 'var(--accent)', marginBottom: '16px',
                  padding: '8px 16px', background: 'var(--accent-dim)',
                  borderRadius: '4px', display: 'inline-block',
                }}>
                  {attestation.id}
                </div>
                <p style={{
                  fontSize: '0.8rem', color: 'var(--text-dim)',
                  marginBottom: '8px', lineHeight: 1.5,
                }}>
                  Signed by the ZeroPoint server, hash-chained to the attestation ledger.
                </p>
                <div style={{
                  fontFamily: "'JetBrains Mono', monospace", fontSize: '0.65rem',
                  color: 'var(--text-muted)', marginBottom: '20px', wordBreak: 'break-all',
                }}>
                  {attestation.attestation_hash}
                </div>
                <a
                  href={`https://zeropoint.global/verify.html?id=${attestation.id}`}
                  target="_blank"
                  rel="noopener"
                  style={{
                    display: 'inline-block', padding: '10px 28px', borderRadius: '4px',
                    border: '1px solid rgba(126,184,218,0.3)',
                    background: 'var(--accent-glow)', color: 'var(--accent)',
                    fontFamily: "'Inter', sans-serif", fontSize: '14px',
                    fontWeight: 500, textDecoration: 'none',
                  }}
                >
                  View Attestation
                </a>
                <button
                  onClick={() => setShowAttestationModal(false)}
                  style={{
                    display: 'block', width: '100%', padding: '8px', marginTop: '12px',
                    background: 'transparent', border: 'none',
                    color: 'var(--text-muted)', fontFamily: "'Inter', sans-serif",
                    fontSize: '0.8rem', cursor: 'pointer',
                  }}
                >
                  Close
                </button>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
