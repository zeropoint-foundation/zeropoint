name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust Workspace ──────────────────────────────────────────
  rust:
    name: Rust (build + test + clippy + fmt)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libusb-1.0-0-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── Minimal kernel (default features = off) ──
      - name: Build (minimal kernel)
        run: cargo build --workspace

      - name: Test (minimal kernel)
        run: cargo test --workspace

      - name: Clippy (minimal kernel)
        run: cargo clippy --workspace -- -D warnings

      # ── Full monolith (all feature modules enabled) ──
      - name: Build (full features)
        run: cargo build --workspace --features zp-cli/full,zp-server/full,zp-policy/policy-wasm

      - name: Test (full features)
        run: cargo test --workspace --features zp-cli/full,zp-server/full,zp-policy/policy-wasm

      - name: Clippy (full features)
        run: cargo clippy --workspace --features zp-cli/full,zp-server/full,zp-policy/policy-wasm -- -D warnings

      - name: Format check
        run: cargo fmt --all --check

  # ── Feature-gate regression ─────────────────────────────────
  # Ensures each feature module compiles independently and the
  # minimal kernel never accidentally depends on gated code.
  feature-gates:
    name: Feature-gate matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        profile:
          - name: minimal-kernel
            flags: ""
          - name: policy-wasm-only
            flags: "--features zp-policy/policy-wasm"
          - name: os-keychain-only
            flags: "--features zp-cli/os-keychain"
          - name: hw-trezor-only
            flags: "--features zp-cli/hw-trezor"
          - name: embedded-server-only
            flags: "--features zp-cli/embedded-server"
          - name: full-monolith
            flags: "--features zp-cli/full,zp-server/full,zp-policy/policy-wasm"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libusb-1.0-0-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-gates-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-gates-

      - name: "Build: ${{ matrix.profile.name }}"
        run: cargo build --workspace ${{ matrix.profile.flags }}

      - name: "Check: ${{ matrix.profile.name }}"
        run: cargo check --workspace ${{ matrix.profile.flags }}

  # ── Sentinel (Python) ──────────────────────────────────────
  sentinel:
    name: Sentinel (Python syntax + shell lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python syntax check
        run: |
          for f in tools/sentinel/zp_sentinel/*.py; do
            python -m py_compile "$f"
            echo "✓ $(basename $f)"
          done

      - name: Shell syntax check
        run: |
          sh -n tools/sentinel/install.sh
          echo "✓ install.sh"
          for f in tools/sentinel/platforms/*/profile.sh; do
            sh -n "$f"
            echo "✓ $f"
          done

      - name: Install and smoke test
        run: |
          pip install tomli pynacl blake3
          cd tools/sentinel
          export PYTHONPATH="$(pwd)"
          python -c "from zp_sentinel.config import Config; print('✓ config imports')"
          python -c "from zp_sentinel.gate import GovernanceGate; print('✓ gate imports')"
          python -c "from zp_sentinel.mesh import MeshClient; print('✓ mesh imports')"
          python -c "from zp_sentinel.anomaly import AnomalyDetector; print('✓ anomaly imports')"
          python -c "from zp_sentinel.audit import AuditStore; print('✓ audit imports')"
