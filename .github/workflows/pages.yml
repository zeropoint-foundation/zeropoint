name: GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'tools/sentinel/configurator.html'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Build pages directory
        run: |
          mkdir -p _site/tools/sentinel
          cp tools/sentinel/configurator.html _site/tools/sentinel/
          # Create a redirect index
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><meta http-equiv="refresh" content="0; url=https://github.com/zeropoint-foundation/zeropoint"></head>
          <body>Redirecting to <a href="https://github.com/zeropoint-foundation/zeropoint">ZeroPoint</a></body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
