name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Build Rust binaries ─────────────────────────────────────
  build-rust:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: zp-server
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: zp-server
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: zp-server
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: zp-server

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libusb-1.0-0-dev pkg-config
          ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'sudo apt-get install -y gcc-aarch64-linux-gnu' || 'true' }}

      # Release binaries ship with full feature set
      - name: Build (full features)
        run: cargo build --release --target ${{ matrix.target }} -p zp-server -p zp-cli --features zp-cli/full,zp-server/full
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/zp-server dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/zp-cli dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/zp dist/ 2>/dev/null || true
          tar czf zeropoint-${{ matrix.target }}.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeropoint-${{ matrix.target }}
          path: zeropoint-${{ matrix.target }}.tar.gz

  # ── Package Sentinel ────────────────────────────────────────
  package-sentinel:
    name: Package Sentinel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Package Sentinel (all platforms)
        run: |
          cd tools/sentinel
          tar czf ../../zp-sentinel-${{ github.ref_name }}.tar.gz \
            --transform 's|^|zp-sentinel/|' \
            install.sh \
            zp-sentinel.toml \
            zp_sentinel/*.py \
            platforms/merlin/profile.sh \
            platforms/merlin/S99zp-sentinel \
            platforms/openwrt/profile.sh \
            platforms/linux-systemd/profile.sh \
            platforms/docker/profile.sh \
            platforms/docker/Dockerfile \
            platforms/docker/zp-sentinel.docker.toml \
            configurator.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zp-sentinel
          path: zp-sentinel-${{ github.ref_name }}.tar.gz

  # ── Create GitHub Release ───────────────────────────────────
  release:
    name: Create Release
    needs: [build-rust, package-sentinel]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/zeropoint-x86_64-unknown-linux-gnu/zeropoint-x86_64-unknown-linux-gnu.tar.gz
            artifacts/zeropoint-aarch64-unknown-linux-gnu/zeropoint-aarch64-unknown-linux-gnu.tar.gz
            artifacts/zeropoint-x86_64-apple-darwin/zeropoint-x86_64-apple-darwin.tar.gz
            artifacts/zeropoint-aarch64-apple-darwin/zeropoint-aarch64-apple-darwin.tar.gz
            artifacts/zp-sentinel/zp-sentinel-${{ github.ref_name }}.tar.gz
          body: |
            ## Downloads

            ### ZeroPoint Core (Rust)
            | Platform | Download |
            |----------|----------|
            | Linux x86_64 | `zeropoint-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux ARM64 | `zeropoint-aarch64-unknown-linux-gnu.tar.gz` |
            | macOS x86_64 | `zeropoint-x86_64-apple-darwin.tar.gz` |
            | macOS ARM64 (Apple Silicon) | `zeropoint-aarch64-apple-darwin.tar.gz` |

            ### ZeroPoint Sentinel (Network Edge)
            | Package | Platforms |
            |---------|-----------|
            | `zp-sentinel-${{ github.ref_name }}.tar.gz` | ASUS Merlin, OpenWrt, Linux, Docker |

            **Quick install:** `curl -fsSL https://zeropoint.global/sentinel/install.sh | sh`

            **[Install Configurator →](https://zeropoint-foundation.github.io/zeropoint/tools/sentinel/configurator.html)**
